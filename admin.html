<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>TARRYTALK — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
  --bg:#07100d;--bg2:#0d1a14;--bg3:#101f18;
  --surface:#13261c;--surface2:#172e22;
  --border:rgba(0,220,100,.1);--border2:rgba(0,220,100,.2);
  --text:#e2f5eb;--text2:#6ea882;--text3:#3a5e49;
  --green:#00dc6e;--green2:#00aa55;--green3:#007038;
  --glow:rgba(0,220,110,.18);--glow2:rgba(0,220,110,.32);
  --red:#ff4f6a;--red-bg:rgba(255,79,106,.08);
  --yellow:#ffd166;--blue:#60b4ff;--orange:#ff9f43;
}
:root[data-theme="light"]{
  --bg:#f0f7f3;--bg2:#ffffff;--bg3:#e8f5ee;
  --surface:#ffffff;--surface2:#f5faf7;
  --border:rgba(0,150,70,.12);--border2:rgba(0,150,70,.22);
  --text:#0d2a1a;--text2:#2e7050;--text3:#7aad90;
  --green:#009944;--green2:#007733;--green3:#005522;
  --glow:rgba(0,180,80,.12);--glow2:rgba(0,180,80,.25);
  --red:#e0223a;--red-bg:rgba(224,34,58,.08);
  --yellow:#c8860a;--blue:#1a7acc;--orange:#d07020;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}
.theme-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:1px 8px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .2s;border:1px solid transparent;background:none;width:calc(100% - 16px);}
.theme-btn:hover{background:var(--surface);color:var(--green);}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input{font-family:inherit;outline:none;}
a{text-decoration:none;color:inherit;}

/* ── 레이아웃 ── */
.admin-wrap{display:flex;min-height:100vh;}

/* ── 사이드바 ── */
.adm-sb{
  width:230px;background:var(--bg2);border-right:1px solid var(--border);
  padding:0;display:flex;flex-direction:column;flex-shrink:0;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.adm-logo{padding:22px 20px 18px;border-bottom:1px solid var(--border);}
.adm-logo-title{font-size:17px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--green),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.adm-logo-sub{font-size:10px;font-weight:700;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.nav-sec{padding:14px 20px 6px;font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin:1px 8px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .2s;border:1px solid transparent;}
.nav-item:hover{background:var(--surface);color:var(--text2);}
.nav-item.on{background:rgba(0,220,110,.08);border-color:var(--border2);color:var(--green);}
.nav-item .ni{font-size:15px;width:20px;text-align:center;}
.adm-sb-foot{margin-top:auto;padding:14px 8px;border-top:1px solid var(--border);}

/* ── 메인 ── */
.adm-main{flex:1;padding:28px 28px 40px;overflow-y:auto;min-width:0;}
@media(max-width:720px){.adm-sb{display:none;}.adm-main{padding:18px 16px;}}
.theme-fab{display:none;}
@media(max-width:720px){
  .theme-fab{display:flex;align-items:center;gap:6px;position:fixed;bottom:20px;right:20px;
    background:var(--bg2);border:1.5px solid var(--border2);border-radius:50px;
    padding:9px 16px;font-size:13px;font-weight:700;color:var(--text2);
    cursor:pointer;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s;}
  .theme-fab:hover{border-color:var(--green);color:var(--green);}
}

/* 페이지 헤더 */
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:12px;flex-wrap:wrap;}
.pg-title{font-size:24px;font-weight:900;letter-spacing:-.5px;}
.pg-title span{background:linear-gradient(135deg,var(--green),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pg-date{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500;}
.head-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.add-btn{padding:10px 18px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:12px;color:#040d09;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px var(--glow);transition:all .2s;display:flex;align-items:center;gap:6px;}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px var(--glow2);}

/* 통계 카드 */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
@media(min-width:900px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:18px 20px;
  position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3);}
.stat-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.06;}
.sc-users::before{background:var(--green);}
.sc-rooms::before{background:var(--blue);}
.sc-msgs::before{background:var(--yellow);}
.sc-admins::before{background:var(--red);}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.si-g{background:rgba(0,220,110,.12);}
.si-b{background:rgba(96,180,255,.12);}
.si-y{background:rgba(255,209,102,.12);}
.si-r{background:rgba(255,79,106,.1);}
.stat-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:50px;background:var(--surface);color:var(--text3);}
.stat-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;margin-bottom:4px;}
.stat-lbl{font-size:12px;color:var(--text3);font-weight:500;}

/* 카드 */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:800;}
.card-action{font-size:12px;color:var(--green);cursor:pointer;font-weight:700;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:400px;}
th{font-size:10px;font-weight:800;color:var(--text3);text-align:left;padding:9px 12px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);}
td{padding:12px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,220,110,.02);}
.u-cell{display:flex;align-items:center;gap:10px;}
.u-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.u-name{font-weight:700;font-size:13px;}
.u-email{font-size:11px;color:var(--text3);margin-top:1px;}
.pill{padding:4px 10px;border-radius:50px;font-size:11px;font-weight:700;display:inline-block;}
.p-on{background:rgba(0,220,110,.12);color:var(--green);}
.p-dis{background:var(--red-bg);color:var(--red);}
.p-admin{background:rgba(96,180,255,.12);color:var(--blue);}
.act-btns{display:flex;gap:5px;flex-wrap:wrap;}
.act-btn{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:700;transition:all .15s;cursor:pointer;}
.ab-dis{background:rgba(255,159,67,.1);color:var(--orange);border:1px solid rgba(255,159,67,.2);}
.ab-dis:hover{background:var(--orange);color:#fff;}
.ab-enable{background:rgba(0,220,110,.1);color:var(--green);border:1px solid var(--border2);}
.ab-enable:hover{background:var(--green);color:#040d09;}
.ab-del{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,79,106,.2);}
.ab-del:hover{background:var(--red);color:#fff;}
.ab-admin{background:rgba(96,180,255,.1);color:var(--blue);border:1px solid rgba(96,180,255,.2);}
.ab-admin:hover{background:var(--blue);color:#040d09;}
.empty-tbl{padding:32px;text-align:center;color:var(--text3);font-size:13px;line-height:1.7;}

/* 그리드 */
.grid2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:800px){.grid2{grid-template-columns:3fr 2fr;}}

/* 바 차트 */
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:12px;font-weight:600;width:64px;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--surface2);border-radius:50px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--green),var(--green2));transition:width 1.2s cubic-bezier(.16,1,.3,1);}
.bar-val{font-size:12px;font-weight:700;width:32px;text-align:right;color:var(--text2);}

/* 로그 */
.log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.ld-g{background:var(--green);}
.ld-y{background:var(--yellow);}
.ld-r{background:var(--red);}
.log-txt{font-size:12px;line-height:1.55;flex:1;color:var(--text2);}
.log-time{font-size:11px;color:var(--text3);flex-shrink:0;}

/* 방 카드 */
.room-card{display:flex;align-items:center;gap:10px;padding:11px;border-radius:13px;transition:background .15s;}
.room-card:hover{background:var(--surface);}
.rc-av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--surface2);flex-shrink:0;}
.rc-name{font-size:13px;font-weight:700;}
.rc-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.rc-del{padding:5px 10px;border-radius:8px;background:var(--red-bg);color:var(--red);border:1px solid rgba(255,79,106,.2);font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .2s;}
.rc-del:hover{background:var(--red);color:#fff;}

/* 공지 입력 */
.notice-area{width:100%;min-height:90px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:vertical;transition:border-color .2s;}
.notice-area:focus{outline:none;border-color:var(--green);}
.notice-area::placeholder{color:var(--text3);}

/* ── 모달 ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.show{display:flex;}
.modal{background:var(--bg3);border:1px solid var(--border);border-radius:22px;width:100%;max-width:430px;margin:16px;box-shadow:0 32px 64px rgba(0,0,0,.5);animation:up .3s cubic-bezier(.16,1,.3,1);}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);}
.modal-body{padding:20px;}
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:11px;font-weight:800;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.mfield input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);font-size:14px;transition:border-color .2s;}
.mfield input:focus{border-color:var(--green);}
.mfield input.ng{border-color:var(--red)!important;}
.m-err{font-size:12px;font-weight:600;color:var(--red);margin-top:4px;display:none;}
.m-err.show{display:block;}
.modal-foot{padding:0 20px 18px;display:flex;gap:8px;}
.m-submit{flex:1;padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:13px;color:#040d09;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px var(--glow);transition:all .2s;}
.m-submit:hover{transform:translateY(-1px);}
.m-cancel{flex:1;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:13px;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;}

/* 확인 모달 */
.confirm-modal{background:var(--bg3);border:1px solid var(--border);border-radius:22px;width:320px;max-width:92vw;margin:16px;padding:26px 22px;text-align:center;animation:up .3s cubic-bezier(.16,1,.3,1);}
.conf-icon{font-size:40px;margin-bottom:12px;}
.conf-title{font-size:17px;font-weight:800;margin-bottom:8px;}
.conf-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:18px;}
.conf-btns{display:flex;gap:8px;}
.conf-ok{flex:1;padding:12px;background:var(--red);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;}
.conf-cancel{flex:1;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:50px;padding:11px 22px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.t-ok{background:var(--green);color:#040d09;}
.t-err{background:var(--red);color:#fff;}
.t-info{background:var(--bg2);color:var(--text);border:1px solid var(--border);}

/* 로딩 */
.loading-overlay{position:fixed;inset:0;background:rgba(7,16,13,.95);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.loading-overlay.hide{display:none;}
.spinner{width:32px;height:32px;border:3px solid rgba(0,220,110,.15);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 공지 전송 버튼 */
.notice-send-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:12px;color:#040d09;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px var(--glow);margin-top:10px;transition:all .2s;}
.notice-send-btn:hover{transform:translateY(-1px);}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="admin-wrap">
<!-- ── 사이드바 ── -->
<div class="adm-sb">
  <div class="adm-logo">
    <div class="adm-logo-title">TARRYTALK</div>
    <div class="adm-logo-sub">관리자 패널</div>
  </div>
  <div class="nav-sec">메인</div>
  <div class="nav-item on" onclick="switchSection('dashboard')"><span class="ni">📊</span>대시보드</div>
  <div class="nav-item" onclick="switchSection('users')"><span class="ni">👥</span>회원 관리</div>
  <div class="nav-item" onclick="switchSection('rooms')"><span class="ni">💬</span>채팅방 관리</div>
  <div class="nav-item" onclick="switchSection('notice')"><span class="ni">📢</span>공지 발송</div>
  <div class="adm-sb-foot">
    <div class="nav-item" onclick="location.href='chat.html'"><span class="ni">💬</span>채팅으로</div>
    <button class="theme-btn" onclick="toggleTheme()"><span class="ni" id="ti">🌙</span><span id="tl">밤 모드</span></button>
    <div class="nav-item" onclick="doLogout()"><span class="ni">🚪</span>로그아웃</div>
  </div>
</div>

<!-- ── 메인 ── -->
<div class="adm-main">
  <div class="pg-head">
    <div>
      <div class="pg-title">대시보드 <span>📊</span></div>
      <div class="pg-date" id="pg-date"></div>
    </div>
    <div class="head-acts">
      <button class="add-btn" onclick="openAddModal()">➕ 사용자 추가</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card sc-users">
      <div class="stat-top"><div class="stat-icon si-g">👥</div><span class="stat-badge" id="badge-users">0명</span></div>
      <div class="stat-val" id="stat-users">0</div>
      <div class="stat-lbl">전체 회원</div>
    </div>
    <div class="stat-card sc-rooms">
      <div class="stat-top"><div class="stat-icon si-b">💬</div><span class="stat-badge" id="badge-rooms">0개</span></div>
      <div class="stat-val" id="stat-rooms">0</div>
      <div class="stat-lbl">채팅방</div>
    </div>
    <div class="stat-card sc-msgs">
      <div class="stat-top"><div class="stat-icon si-y">✉️</div><span class="stat-badge" id="badge-msgs">0개</span></div>
      <div class="stat-val" id="stat-msgs">0</div>
      <div class="stat-lbl">전체 메시지</div>
    </div>
    <div class="stat-card sc-admins">
      <div class="stat-top"><div class="stat-icon si-r">🔐</div><span class="stat-badge">관리자</span></div>
      <div class="stat-val" id="stat-admins">1</div>
      <div class="stat-lbl">관리자 계정</div>
    </div>
  </div>

  <!-- 대시보드 섹션 -->
  <div id="sec-dashboard">
    <div class="grid2">
      <div class="card">
        <div class="card-head">
          <div class="card-title">최근 가입 회원</div>
          <span class="card-action" onclick="switchSection('users')">전체 보기 →</span>
        </div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>회원</th><th>가입일</th><th>상태</th></tr></thead>
          <tbody id="recent-users-tbody"></tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title">최근 활동 로그</div>
        </div>
        <div id="log-list"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">채팅방별 메시지 현황</div></div>
      <div class="bar-chart" id="bar-chart"><div class="empty-tbl">데이터 없음</div></div>
    </div>
  </div>

  <!-- 회원 관리 섹션 -->
  <div id="sec-users" style="display:none;">
    <div class="card">
      <div class="card-head">
        <div class="card-title">전체 회원 목록</div>
        <span class="card-action" onclick="openAddModal()">+ 사용자 추가</span>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>회원</th><th>가입일</th><th>구분</th><th>관리</th></tr></thead>
        <tbody id="all-users-tbody"></tbody>
      </table></div>
    </div>
  </div>

  <!-- 채팅방 관리 섹션 -->
  <div id="sec-rooms" style="display:none;">
    <div class="card">
      <div class="card-head">
        <div class="card-title">전체 채팅방</div>
        <span class="card-action" id="room-count-lbl">0개</span>
      </div>
      <div id="rooms-list-el"><div class="empty-tbl">채팅방이 없습니다</div></div>
    </div>
  </div>

  <!-- 공지 발송 섹션 -->
  <div id="sec-notice" style="display:none;">
    <div class="card">
      <div class="card-head"><div class="card-title">📢 공지 발송</div></div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.7;">공지사항을 전체 채팅방에 시스템 메시지로 발송합니다.</p>
      <textarea class="notice-area" id="notice-text" placeholder="공지 내용을 입력하세요..."></textarea>

</div>

<!-- 사용자 추가 모달 -->
<div class="overlay" id="add-overlay" onclick="if(event.target.id==='add-overlay')closeAddModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">➕ 새 사용자 추가</div>
      <div class="modal-x" onclick="closeAddModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="mfield"><label>이름</label><input type="text" id="add-name" placeholder="홍길동" oninput="clearErr('add-name','err-name')"><div class="m-err" id="err-name"></div></div>
      <div class="mfield"><label>이메일</label><input type="email" id="add-email" placeholder="example@email.com" oninput="clearErr('add-email','err-email')"><div class="m-err" id="err-email"></div></div>
      <div class="mfield"><label>비밀번호 (대·소문자·숫자 포함 6자 이상)</label><input type="password" id="add-pw" placeholder="비밀번호 입력" oninput="clearErr('add-pw','err-pw')"><div class="m-err" id="err-pw"></div></div>

<!-- 확인 모달 -->
<div class="overlay" id="confirm-overlay">
  <div class="confirm-modal">

    <div class="conf-title" id="conf-title">확인</div>
    <div class="conf-desc" id="conf-desc"></div>
    <div class="conf-btns">
      <button class="conf-cancel" onclick="closeConfirm()">취소</button>
      <button class="conf-ok" id="conf-ok-btn" onclick="confirmAction()">확인</button>

</div>

<div class="toast" id="toast-el"></div>
<button class="theme-fab" onclick="toggleTheme()"><span id="ti-m">🌙</span><span id="tl-m">밤 모드</span></button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, set, get, push, remove, update, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyDC9qSmH-1z778oiI7QbDY_JrKis95z_C4",
  authDomain:"tarrytalk.firebaseapp.com",
  databaseURL:"https://tarrytalk-default-rtdb.firebaseio.com",
  projectId:"tarrytalk",
  storageBucket:"tarrytalk.firebasestorage.app",
  messagingSenderId:"322779846377",
  appId:"1:322779846377:web:12253ee2f2330dd1a04278"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);
const ADMIN_EMAIL = 'tarry9653@daum.net';
const COLORS = ['#00a84a','#0087d4','#a855f7','#e85d04','#d62828','#2ec4b6'];
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

let adminSess = null;
let allUsers = {}, allRooms = {}, allMsgs = {};
let pendingAction = null;

/* ── 관리자 인증 ── */
if (sessionStorage.getItem('tt_admin') !== '1') {
  location.href = 'index.html';
} else {
  adminSess = { uid: 'admin', name: '관리자', email: '' };
  document.getElementById('loading-overlay').classList.add('hide');
  document.getElementById('pg-date').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  loadData();
}

/* ── 실시간 데이터 로드 ── */
function loadData() {
  onValue(ref(db,'users'), snap => {
    allUsers = snap.val()||{};
    renderStats(); renderAllUsers(); renderRecentUsers(); renderLog();
  });
  onValue(ref(db,'rooms'), snap => {
    allRooms = snap.val()||{};
    renderStats(); renderRooms(); renderBarChart();
  });
  onValue(ref(db,'messages'), snap => {
    allMsgs = snap.val()||{};
    renderStats(); renderBarChart(); renderLog();
  });
}

/* ── 통계 ── */
function renderStats() {
  const users = Object.values(allUsers);
  const rooms = Object.values(allRooms);
  const totalMsgs = Object.values(allMsgs).reduce((s,v)=>s+Object.keys(v||{}).length,0);
  const admins = users.filter(u=>u.isAdmin).length;
  document.getElementById('stat-users').textContent = users.length;
  document.getElementById('stat-rooms').textContent = rooms.length;
  document.getElementById('stat-msgs').textContent = totalMsgs.toLocaleString();
  document.getElementById('stat-admins').textContent = Math.max(1,admins);
  document.getElementById('badge-users').textContent = users.length+'명';
  document.getElementById('badge-rooms').textContent = rooms.length+'개';
  document.getElementById('badge-msgs').textContent = totalMsgs+'개';
}

/* ── 최근 가입 회원 (대시보드) ── */
function renderRecentUsers() {
  const users = Object.entries(allUsers).map(([uid,v])=>({uid,...v})).sort((a,b)=>(b.joinedAt||0)-(a.joinedAt||0)).slice(0,5);
  const tbody = document.getElementById('recent-users-tbody');
  if(!users.length){tbody.innerHTML='<tr><td colspan="3"><div class="empty-tbl">회원 없음</div></td></tr>';return;}
  tbody.innerHTML = users.map((u,i)=>{
    const date = u.joinedAt?relTime(u.joinedAt):'–';
    return`<tr>
      <td><div class="u-cell">
        <div class="u-av" style="background:${COLORS[i%COLORS.length]}">${(u.displayName||'?')[0].toUpperCase()}</div>
        <div><div class="u-name">${esc(u.displayName||'알 수 없음')}</div><div class="u-email">${esc(u.email||'')}</div></div>
      </div></td>
      <td style="font-size:11px;color:var(--text3)">${date}</td>
      <td><span class="pill ${u.disabled?'p-dis':u.isAdmin?'p-admin':'p-on'}">${u.disabled?'비활성':u.isAdmin?'관리자':'회원'}</span></td>
    </tr>`;
  }).join('');
}

/* ── 전체 회원 ── */
function renderAllUsers() {
  const users = Object.entries(allUsers).map(([uid,v])=>({uid,...v})).sort((a,b)=>(b.joinedAt||0)-(a.joinedAt||0));
  const tbody = document.getElementById('all-users-tbody');
  if(!users.length){tbody.innerHTML='<tr><td colspan="4"><div class="empty-tbl">회원 없음</div></td></tr>';return;}
  tbody.innerHTML = users.map((u,i)=>{
    const date = u.joinedAt?new Date(u.joinedAt).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'–';
    const isProtected = u.email===ADMIN_EMAIL;
    return`<tr>
      <td><div class="u-cell">
        <div class="u-av" style="background:${COLORS[i%COLORS.length]}">${(u.displayName||'?')[0].toUpperCase()}</div>
        <div><div class="u-name">${esc(u.displayName||'알 수 없음')}</div><div class="u-email">${esc(u.email||'')}</div></div>
      </div></td>
      <td style="font-size:12px;color:var(--text3)">${date}</td>
      <td><span class="pill ${u.disabled?'p-dis':u.isAdmin?'p-admin':'p-on'}">${u.disabled?'비활성':u.isAdmin?'관리자':'회원'}</span></td>
      <td><div class="act-btns">
        ${!isProtected?`
          ${u.disabled
            ?`<button class="act-btn ab-enable" onclick="toggleDisable('${u.uid}','${esc(u.displayName||'')}',false)">활성화</button>`
            :`<button class="act-btn ab-dis" onclick="toggleDisable('${u.uid}','${esc(u.displayName||'')}',true)">비활성화</button>`
          }
          ${!u.isAdmin?`<button class="act-btn ab-admin" onclick="toggleAdmin('${u.uid}','${esc(u.displayName||'')}')">관리자 설정</button>`:''}
          <button class="act-btn ab-del" onclick="confirmDeleteUser('${u.uid}','${esc(u.displayName||u.email||'')}')">삭제</button>
        `:'<span style="font-size:11px;color:var(--text3)">보호됨</span>'}
      </div></td>
    </tr>`;
  }).join('');
}

/* ── 채팅방 ── */
function renderRooms() {
  const rooms = Object.entries(allRooms).map(([id,v])=>({id,...v})).sort((a,b)=>(b.lastAt||0)-(a.lastAt||0));
  document.getElementById('room-count-lbl').textContent = rooms.length+'개';
  const el = document.getElementById('rooms-list-el');
  if(!rooms.length){el.innerHTML='<div class="empty-tbl">채팅방이 없습니다</div>';return;}
  el.innerHTML = rooms.map(r=>{
    const msgCount = Object.keys(allMsgs[r.id]||{}).length;
    const memCount = Object.keys(r.members||{}).length;
    return`<div class="room-card">
      <div class="rc-av">${r.emoji||'💬'}</div>
      <div style="flex:1;min-width:0;">
        <div class="rc-name">${esc(r.name)}</div>
        <div class="rc-sub">${r.type==='group'?'단체채팅':'1대1'} · 멤버 ${memCount}명 · 메시지 ${msgCount}개</div>
      </div>
      <button class="rc-del" onclick="confirmDeleteRoom('${r.id}','${esc(r.name)}')">삭제</button>
    </div>`;
  }).join('');
}

/* ── 바 차트 ── */
function renderBarChart() {
  const rooms = Object.entries(allRooms).map(([id,v])=>({id,name:v.name,cnt:Object.keys(allMsgs[id]||{}).length})).sort((a,b)=>b.cnt-a.cnt).slice(0,6);
  const barEl = document.getElementById('bar-chart');
  const max = rooms.reduce((m,r)=>Math.max(m,r.cnt),1);
  if(!rooms.length||max===0){barEl.innerHTML='<div class="empty-tbl">메시지 데이터 없음</div>';return;}
  barEl.innerHTML = rooms.map(r=>`
    <div class="bar-row">
      <div class="bar-lbl" title="${esc(r.name)}">${esc(r.name.substring(0,6))}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,Math.round((r.cnt/max)*100))}%"></div></div>
      <div class="bar-val">${r.cnt}</div>
    </div>`).join('');
}

/* ── 활동 로그 ── */
function renderLog() {
  const logs = [];
  Object.entries(allUsers).sort((a,b)=>(b[1].joinedAt||0)-(a[1].joinedAt||0)).slice(0,3)
    .forEach(([,u])=>logs.push({dot:'ld-g',text:`${u.displayName||'사용자'}님이 가입했습니다`,time:relTime(u.joinedAt)}));
  Object.entries(allRooms).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)).slice(0,2)
    .forEach(([,r])=>logs.push({dot:'ld-y',text:`채팅방 "${r.name}" 생성됨`,time:relTime(r.createdAt)}));
  const allMsgFlat = [];
  Object.entries(allMsgs).forEach(([,msgs])=>Object.values(msgs||{}).forEach(m=>allMsgFlat.push(m)));
  allMsgFlat.sort((a,b)=>(b.at||0)-(a.at||0)).slice(0,3).forEach(m=>{
    logs.push({dot:'ld-g',text:`새 메시지: "${(m.text||'미디어').substring(0,20)}"`,time:relTime(m.at)});
  });
  const logEl = document.getElementById('log-list');
  if(!logs.length){logEl.innerHTML='<div class="empty-tbl">활동 기록 없음</div>';return;}
  logEl.innerHTML = logs.slice(0,8).map(l=>`
    <div class="log-item">
      <div class="log-dot ${l.dot}"></div>
      <div class="log-txt">${esc(l.text)}</div>
      <div class="log-time">${l.time}</div>
    </div>`).join('');
}

/* ── 섹션 전환 ── */
window.switchSection = function(sec) {
  ['dashboard','users','rooms','notice'].forEach(s=>{
    document.getElementById('sec-'+s).style.display = s===sec?'':'none';
  });
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    const secs=['dashboard','users','rooms','notice'];
    el.classList.toggle('on', secs[i]===sec);
  });
};

/* ── 사용자 추가 (Firebase Auth + DB) ── */
window.openAddModal = () => { clearAddModal(); document.getElementById('add-overlay').classList.add('show'); };
window.closeAddModal = () => document.getElementById('add-overlay').classList.remove('show');
function clearAddModal() { ['add-name','add-email','add-pw'].forEach(id=>{document.getElementById(id).value='';document.getElementById(id).classList.remove('ng');}); ['err-name','err-email','err-pw'].forEach(id=>{const el=document.getElementById(id);el.textContent='';el.classList.remove('show');}); }
window.clearErr = function(iid,eid) { document.getElementById(iid).classList.remove('ng'); const el=document.getElementById(eid);el.textContent='';el.classList.remove('show'); };
function showErr(iid,eid,msg) { document.getElementById(iid).classList.add('ng'); const el=document.getElementById(eid);el.textContent=msg;el.classList.add('show'); }

window.doAddUser = async function() {
  const name = document.getElementById('add-name').value.trim();
  const email = document.getElementById('add-email').value.trim();
  const pw = document.getElementById('add-pw').value;
  let ok = true;
  if(!name||name.length<2){showErr('add-name','err-name','이름은 2자 이상');ok=false;}
  if(!email||!EMAIL_RE.test(email)){showErr('add-email','err-email','올바른 이메일 형식이 아닙니다');ok=false;}
  const pwOk = pw.length>=6&&/[A-Z]/.test(pw)&&/[a-z]/.test(pw)&&/[0-9]/.test(pw);
  if(!pw||!pwOk){showErr('add-pw','err-pw','대·소문자·숫자 포함 6자 이상');ok=false;}
  if(!ok) return;
  try {
    // 임시 앱 인스턴스로 사용자 생성 (현재 세션 유지)
    const { initializeApp: iApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getAuth: gAuth, createUserWithEmailAndPassword: cUEP, updateProfile: uP } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
    const tmpApp = iApp({...firebaseConfig},'tmp-'+Date.now());
    const tmpAuth = gAuth(tmpApp);
    const cred = await cUEP(tmpAuth, email, pw);
    await uP(cred.user, { displayName: name });
    await set(ref(db,`users/${cred.user.uid}`),{displayName:name,email,isAdmin:false,joinedAt:Date.now(),online:false,disabled:false});
    await tmpAuth.signOut();
    window.closeAddModal();
    showToast(`✅ ${name}님이 추가됐습니다`,'ok');
  } catch(e) {
    const c = e.code||'';
    if(c.includes('email-already-in-use')) showErr('add-email','err-email','이미 등록된 이메일입니다');
    else showErr('add-pw','err-pw','오류: '+e.message);
  }
};

/* ── 비활성화/활성화 ── */
window.toggleDisable = function(uid, name, disable) {
  pendingAction = async () => {
    await update(ref(db,`users/${uid}`),{disabled:disable});
    showToast(disable?`⛔ ${name}님을 비활성화했습니다`:`✅ ${name}님을 활성화했습니다`,'ok');
  };
  openConfirm(disable?'⛔':'✅', disable?`${name}님 비활성화`:`${name}님 활성화`, disable?'이 계정을 비활성화하면 해당 사용자는 로그인할 수 없습니다.':'이 계정을 다시 활성화합니다.', disable?'비활성화':'활성화');
};

/* ── 관리자 설정 ── */
window.toggleAdmin = function(uid, name) {
  pendingAction = async () => {
    await update(ref(db,`users/${uid}`),{isAdmin:true});
    showToast(`⚙️ ${name}님에게 관리자 권한을 부여했습니다`,'ok');
  };
  openConfirm('⚙️','관리자 권한 부여',`${name}님에게 관리자 권한을 부여합니다. 이 권한은 데이터베이스에서만 취소할 수 있습니다.`,'권한 부여');
};

/* ── 사용자 삭제 ── */
window.confirmDeleteUser = function(uid, name) {
  pendingAction = async () => {
    await update(ref(db,`users/${uid}`),{disabled:true,deletedAt:Date.now()});
    showToast(`🗑️ ${name}님이 비활성화됐습니다 (Auth 삭제는 서버에서)`, 'ok');
  };
  openConfirm('🗑️','회원 삭제',`"${name}" 님의 계정을 삭제합니다. 이 작업은 되돌리기 어렵습니다.`,'삭제');
};

/* ── 채팅방 삭제 ── */
window.confirmDeleteRoom = function(id, name) {
  pendingAction = async () => {
    await remove(ref(db,`rooms/${id}`));
    await remove(ref(db,`messages/${id}`));
    showToast(`🗑️ "${name}" 채팅방이 삭제됐습니다`,'ok');
  };
  openConfirm('🗑️','채팅방 삭제',`"${name}" 채팅방과 모든 대화 내용을 삭제합니다. 이 작업은 되돌릴 수 없습니다.`,'삭제');
};

/* ── 공지 발송 ── */
window.sendNotice = async function() {
  const text = document.getElementById('notice-text').value.trim();
  if (!text) { showToast('공지 내용을 입력하세요','info'); return; }
  const rooms = Object.keys(allRooms);
  if (!rooms.length) { showToast('채팅방이 없습니다','info'); return; }
  const promises = rooms.map(id => set(push(ref(db,`messages/${id}`)),{
    uid:'system',displayName:'📢 공지',text:`[공지] ${text}`,type:'system',at:Date.now()
  }));
  await Promise.all(promises);
  document.getElementById('notice-text').value='';
  showToast(`📢 ${rooms.length}개 채팅방에 공지를 발송했습니다`,'ok');
};

/* ── 확인 모달 ── */
function openConfirm(icon, title, desc, okLabel) {
  document.getElementById('conf-icon').textContent = icon;
  document.getElementById('conf-title').textContent = title;
  document.getElementById('conf-desc').textContent = desc;
  document.getElementById('conf-ok-btn').textContent = okLabel;
  document.getElementById('confirm-overlay').classList.add('show');
}
window.closeConfirm = () => { document.getElementById('confirm-overlay').classList.remove('show'); pendingAction=null; };
window.confirmAction = async function() {
  if (pendingAction) { await pendingAction(); pendingAction=null; }
  window.closeConfirm();
};

/* ── 테마 ── */
function toggleTheme() {
  const h = document.documentElement, d = h.dataset.theme === 'dark';
  h.dataset.theme = d ? 'light' : 'dark';
  const icon = d ? '🌙' : '☀️', label = d ? '밤 모드' : '낮 모드';
  const ti = document.getElementById('ti'), tl = document.getElementById('tl');
  const tiM = document.getElementById('ti-m'), tlM = document.getElementById('tl-m');
  if(ti) ti.textContent = icon;
  if(tl) tl.textContent = label;
  if(tiM) tiM.textContent = icon;
  if(tlM) tlM.textContent = label;
  localStorage.setItem('tt_theme', h.dataset.theme);
}
// 테마 초기화 (type=module은 DOM 로드 후 실행되므로 직접 실행)
{
  const t = localStorage.getItem('tt_theme') || 'light';
  document.documentElement.dataset.theme = t;
  const ti = document.getElementById('ti'), tl = document.getElementById('tl');
  const tiM = document.getElementById('ti-m'), tlM = document.getElementById('tl-m');
  if (t === 'dark') {
    if(ti) ti.textContent = '☀️';
    if(tl) tl.textContent = '낮 모드';
    if(tiM) tiM.textContent = '☀️';
    if(tlM) tlM.textContent = '낮 모드';
  }
}

/* ── 로그아웃 ── */
window.doLogout = function() {
  sessionStorage.removeItem('tt_admin'); location.href='index.html';
};

/* ── 유틸 ── */
function relTime(ts) { if(!ts)return'–'; const d=Date.now()-(typeof ts==='number'?ts:new Date(ts).getTime()); if(d<60000)return'방금'; if(d<3600000)return Math.floor(d/60000)+'분 전'; if(d<86400000)return Math.floor(d/3600000)+'시간 전'; return Math.floor(d/86400000)+'일 전'; }
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _t;
window.showToast = function(msg,type='ok'){const el=document.getElementById('toast-el');el.textContent=msg;el.className=`toast show t-${type}`;clearTimeout(_t);_t=setTimeout(()=>el.className='toast',2800);};
</script>
