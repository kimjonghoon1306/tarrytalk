<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>TARRYTALK — 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{
  --bg:#f0fdf7;--bg2:#fff;--surface:#e8faf2;--border:#c3eada;
  --text:#0d2b1e;--text2:#3d6b55;--accent:#00b874;--accent2:#00976b;
  --glow:rgba(0,184,116,.2);--shadow:rgba(0,100,60,.08);
  --sb:#f5fdf9;--hover:#e0f7ec;
  --red:#e53e3e;--rbg:rgba(229,62,62,.08);--rbr:rgba(229,62,62,.3);
  --yellow:#d69e2e;--blue:#3182ce;--ov:rgba(0,0,0,.45);
}
:root[data-theme="dark"]{
  --bg:#0d1f16;--bg2:#122019;--surface:#1a2f21;--border:#2a4a35;
  --text:#d4f5e5;--text2:#7fc9a0;--accent:#00e08a;--accent2:#00b874;
  --glow:rgba(0,224,138,.15);--shadow:rgba(0,0,0,.4);
  --sb:#0f1d15;--hover:#1f3626;
  --red:#fc8181;--rbg:rgba(252,129,129,.08);--rbr:rgba(252,129,129,.3);
  --yellow:#f6e05e;--blue:#90cdf4;--ov:rgba(0,0,0,.65);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;transition:background .3s,color .3s;}

/* ── 사이드바 ── */
.sidebar{width:220px;background:var(--sb);border-right:1.5px solid var(--border);padding:20px 0;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-logo{padding:0 18px 20px;font-size:18px;font-weight:900;color:var(--accent);}
.sb-logo span{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-top:2px;}
.nav-sec{padding:12px 18px 4px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;margin:0 6px;transition:all .2s;text-decoration:none;}
.nav-item:hover{background:var(--hover);color:var(--text);}
.nav-item.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px var(--glow);}
.nav-item .ni{font-size:16px;width:20px;text-align:center;}
.sb-bottom{margin-top:auto;padding:14px 6px 0;border-top:1.5px solid var(--border);}

/* ── 메인 ── */
.main{flex:1;padding:24px;overflow-y:auto;min-width:0;}

/* 헤더 */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:900;letter-spacing:-.5px;}
.page-title span{color:var(--accent);}
.page-date{font-size:12px;color:var(--text2);margin-top:3px;}
.head-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.theme-btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:50px;background:var(--surface);cursor:pointer;font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;white-space:nowrap;}
.theme-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.add-btn{padding:10px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px var(--glow);transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px var(--glow);}

/* 통계 카드 */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
@media(min-width:900px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 2px 8px var(--shadow);transition:all .2s;cursor:default;}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 22px var(--shadow);}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.si-g{background:rgba(0,184,116,.15);}
.si-b{background:rgba(49,130,206,.15);}
.si-y{background:rgba(214,158,46,.15);}
.si-r{background:rgba(229,62,62,.12);}
.stat-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
.sb-up{background:rgba(0,184,116,.15);color:var(--accent);}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:3px;}
.stat-lbl{font-size:12px;color:var(--text2);font-weight:500;}

/* 섹션 카드 */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 2px 8px var(--shadow);margin-bottom:16px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:800;}
.card-sub{font-size:12px;color:var(--accent);cursor:pointer;font-weight:600;}

/* 테이블 */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:400px;}
th{font-size:11px;font-weight:700;color:var(--text2);text-align:left;padding:8px 10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1.5px solid var(--border);}
td{padding:11px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--hover);}
.u-cell{display:flex;align-items:center;gap:9px;}
.u-av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.u-name{font-weight:700;font-size:13px;}
.u-email{font-size:11px;color:var(--text2);}
.pill{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;display:inline-block;}
.p-on{background:rgba(0,184,116,.15);color:var(--accent);}
.p-off{background:var(--surface);color:var(--text2);}
.p-ban{background:var(--rbg);color:var(--red);}
.p-admin{background:rgba(49,130,206,.15);color:var(--blue);}
.act-btns{display:flex;gap:5px;}
.act-btn{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.ab-edit{background:var(--surface);color:var(--accent);border:1px solid var(--border);}
.ab-del{background:var(--rbg);color:var(--red);}
.ab-edit:hover{background:var(--accent);color:#fff;}
.ab-del:hover{background:var(--red);color:#fff;}

/* 빈 테이블 */
.empty-tbl{padding:32px;text-align:center;color:var(--text2);font-size:13px;}

/* 바 차트 */
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:12px;font-weight:600;width:60px;color:var(--text2);flex-shrink:0;}
.bar-track{flex:1;background:var(--surface);border-radius:50px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(.16,1,.3,1);}
.bar-val{font-size:12px;font-weight:700;width:40px;text-align:right;}

/* 로그 */
.log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.ld-g{background:var(--accent);}
.ld-y{background:var(--yellow);}
.ld-r{background:var(--red);}
.log-txt{font-size:12px;line-height:1.5;flex:1;}
.log-time{font-size:11px;color:var(--text2);flex-shrink:0;}

/* 2col */
.grid2{display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:800px){.grid2{grid-template-columns:3fr 2fr;}}

/* ── 모달 ── */
.overlay{position:fixed;inset:0;background:var(--ov);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg2);border-radius:22px;width:100%;max-width:420px;margin:16px;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:up .3s cubic-bezier(.16,1,.3,1);}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
.modal-body{padding:20px;}
.mfield{margin-bottom:14px;}
.mfield label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.mfield input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.mfield input:focus{border-color:var(--accent);}
.mfield input.ng{border-color:var(--red)!important;}
.m-err{font-size:12px;font-weight:600;color:var(--red);margin-top:4px;display:none;}
.m-err.show{display:block;}
.modal-foot{padding:0 20px 18px;}
.m-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 6px 18px var(--glow);transition:all .2s;}
.m-submit:hover{transform:translateY(-1px);}

/* 토스트 */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:13px;padding:11px 20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.t-ok{background:var(--accent);color:#fff;}
.t-err{background:var(--red);color:#fff;}
.t-info{background:var(--bg2);color:var(--text);border:1.5px solid var(--border);}

/* 모바일 */
@media(max-width:680px){
  .sidebar{display:none;}
  .main{padding:16px;}
  .stat-val{font-size:22px;}
}
</style>
</head>
<body>

<!-- 사이드바 -->
<div class="sidebar">
  <div class="sb-logo">⚙️ TARRYTALK<span>관리자 패널</span></div>
  <div class="nav-sec">메인</div>
  <a href="#" class="nav-item on"><span class="ni">📊</span>대시보드</a>
  <a href="#" class="nav-item"><span class="ni">👥</span>회원 관리</a>
  <a href="#" class="nav-item"><span class="ni">💬</span>채팅방 관리</a>
  <a href="#" class="nav-item"><span class="ni">📢</span>공지 발송</a>
  <div class="nav-sec">설정</div>
  <a href="#" class="nav-item"><span class="ni">🔒</span>보안 설정</a>
  <a href="#" class="nav-item"><span class="ni">📋</span>신고 내역</a>
  <div class="sb-bottom">
    <a href="chat.html" class="nav-item"><span class="ni">💬</span>채팅으로</a>
    <a href="index.html" class="nav-item"><span class="ni">🚪</span>로그아웃</a>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="page-head">
    <div>
      <div class="page-title">대시보드 <span>📊</span></div>
      <div class="page-date" id="page-date"></div>
    </div>
    <div class="head-right">
      <button class="theme-btn" onclick="toggleTheme()"><span id="ti">🌙</span><span id="tl">밤 모드</span></button>
      <button class="add-btn" onclick="openAddModal()">➕ 사용자 추가</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon si-g">👥</div><span class="stat-badge sb-up" id="user-badge">▲ 0명</span></div>
      <div class="stat-val" id="stat-users">0</div>
      <div class="stat-lbl">전체 회원 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon si-b">💬</div><span class="stat-badge sb-up" id="room-badge">0개</span></div>
      <div class="stat-val" id="stat-rooms">0</div>
      <div class="stat-lbl">전체 채팅방</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon si-y">✉️</div><span class="stat-badge sb-up" id="msg-badge">0개</span></div>
      <div class="stat-val" id="stat-msgs">0</div>
      <div class="stat-lbl">전체 메시지 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-top"><div class="stat-icon si-r">🔐</div><span class="stat-badge" style="background:var(--rbg);color:var(--red)" id="admin-badge">관리자</span></div>
      <div class="stat-val" id="stat-admin">1</div>
      <div class="stat-lbl">관리자 계정</div>
    </div>
  </div>

  <!-- 회원 테이블 + 채팅방 -->
  <div class="grid2">
    <div class="card">
      <div class="card-head">
        <div class="card-title">가입 회원 목록</div>
        <span class="card-sub" onclick="openAddModal()">+ 추가</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>회원</th>
            <th>가입일</th>
            <th>구분</th>
            <th>관리</th>
          </tr></thead>
          <tbody id="user-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">채팅방 목록</div>
        <span class="card-sub" id="room-count-lbl">0개</span>
      </div>
      <div id="room-list-el">
        <div class="empty-tbl">채팅방이 없습니다</div>
      </div>
    </div>
  </div>

  <!-- 메시지 현황 + 활동로그 -->
  <div class="grid2">
    <div class="card">
      <div class="card-head">
        <div class="card-title">채팅방별 메시지 현황</div>
      </div>
      <div class="bar-chart" id="bar-chart">
        <div class="empty-tbl">데이터 없음</div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">최근 활동 로그</div>
      </div>
      <div id="log-list"></div>
    </div>
  </div>
</div>

<!-- 사용자 추가 모달 -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">➕ 새 사용자 추가</div>
      <div class="modal-x" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label>이름</label>
        <input type="text" id="add-name" placeholder="홍길동" oninput="clearErr('add-name','err-name')">
        <div class="m-err" id="err-name"></div>
      </div>
      <div class="mfield">
        <label>이메일</label>
        <input type="email" id="add-email" placeholder="example@email.com" oninput="clearErr('add-email','err-email')">
        <div class="m-err" id="err-email"></div>
      </div>
      <div class="mfield">
        <label>비밀번호 (영문 대·소문자·숫자 포함 6자 이상)</label>
        <input type="password" id="add-pw" placeholder="비밀번호 입력" oninput="clearErr('add-pw','err-pw')">
        <div class="m-err" id="err-pw"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="m-submit" onclick="doAddUser()">사용자 추가 완료</button>
    </div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script>
const K={USERS:'tt_users',ROOMS:'tt_rooms',MSGS:'tt_messages',SESSION:'tt_session',THEME:'tt_theme',ADMIN:'tt_admin_pw'};
const EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
const COLORS=['linear-gradient(135deg,#00b874,#276749)','linear-gradient(135deg,#f6ad55,#c05621)','linear-gradient(135deg,#76e4f7,#0987a0)','linear-gradient(135deg,#d6bcfa,#6b46c1)','linear-gradient(135deg,#fbb6ce,#b83280)','linear-gradient(135deg,#90cdf4,#2b6cb0)'];

const getUsers =()=>JSON.parse(localStorage.getItem(K.USERS)||'[]');
const getRooms =()=>JSON.parse(localStorage.getItem(K.ROOMS)||'[]');
const getMsgs  =()=>JSON.parse(localStorage.getItem(K.MSGS)||'{}');
const saveUsers=u=>localStorage.setItem(K.USERS,JSON.stringify(u));

/* ── 테마 ── */
function toggleTheme(){
  const h=document.documentElement,d=h.dataset.theme==='dark';
  h.dataset.theme=d?'light':'dark';
  document.getElementById('ti').textContent=d?'🌙':'☀️';
  document.getElementById('tl').textContent=d?'밤 모드':'낮 모드';
  localStorage.setItem(K.THEME,h.dataset.theme);
}
(()=>{
  const t=localStorage.getItem(K.THEME);
  if(t)document.documentElement.dataset.theme=t;
  if(document.documentElement.dataset.theme==='dark'){
    document.getElementById('ti').textContent='☀️';
    document.getElementById('tl').textContent='낮 모드';
  }
})();

/* ── 날짜 ── */
document.getElementById('page-date').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})+' · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

/* ── 메인 렌더 ── */
function render(){
  const users=getUsers();
  const rooms=getRooms();
  const msgs=getMsgs();

  /* 통계 */
  const totalMsgs=Object.values(msgs).reduce((s,arr)=>s+(arr?arr.length:0),0);
  document.getElementById('stat-users').textContent=users.length.toLocaleString();
  document.getElementById('stat-rooms').textContent=rooms.length.toLocaleString();
  document.getElementById('stat-msgs').textContent=totalMsgs.toLocaleString();
  document.getElementById('user-badge').textContent='총 '+users.length+'명';
  document.getElementById('room-badge').textContent=rooms.length+'개';
  document.getElementById('msg-badge').textContent=totalMsgs+'개';

  /* 회원 테이블 */
  const tbody=document.getElementById('user-tbody');
  if(users.length===0){
    tbody.innerHTML=`<tr><td colspan="4"><div class="empty-tbl">가입된 회원이 없습니다<br><br><button onclick="openAddModal()" style="padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;">+ 첫 번째 회원 추가</button></div></td></tr>`;
  } else {
    tbody.innerHTML=users.map((u,i)=>{
      const date=u.joinedAt?new Date(u.joinedAt).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}):'–';
      const isAdm=u.isAdmin||u.email==='admin';
      return`<tr>
        <td><div class="u-cell">
          <div class="u-av" style="background:${COLORS[i%COLORS.length]}">${u.name.charAt(0)}</div>
          <div><div class="u-name">${esc(u.name)}</div><div class="u-email">${esc(u.email)}</div></div>
        </div></td>
        <td style="font-size:12px;color:var(--text2)">${date}</td>
        <td><span class="pill ${isAdm?'p-admin':'p-on'}">${isAdm?'관리자':'회원'}</span></td>
        <td><div class="act-btns">
          ${!isAdm?`<button class="act-btn ab-del" onclick="deleteUser('${u.email}')">삭제</button>`:'<span style="font-size:11px;color:var(--text2)">보호됨</span>'}
        </div></td>
      </tr>`;
    }).join('');
  }

  /* 채팅방 목록 */
  const roomEl=document.getElementById('room-list-el');
  document.getElementById('room-count-lbl').textContent=rooms.length+'개';
  if(rooms.length===0){
    roomEl.innerHTML=`<div class="empty-tbl">채팅방이 없습니다</div>`;
  } else {
    roomEl.innerHTML=rooms.map(r=>{
      const cnt=(msgs[r.id]||[]).length;
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
        <div style="width:38px;height:38px;border-radius:11px;background:${r.color||COLORS[0]};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${r.emoji||'💬'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.name)}</div>
          <div style="font-size:11px;color:var(--text2)">${r.type==='group'?'단체':'1대1'} · 멤버 ${r.members.length}명</div>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--accent)">${cnt}개</div>
      </div>`;
    }).join('');
  }

  /* 바 차트 */
  const barEl=document.getElementById('bar-chart');
  const roomMsgs=rooms.map(r=>({name:r.name,cnt:(msgs[r.id]||[]).length})).sort((a,b)=>b.cnt-a.cnt).slice(0,6);
  const max=roomMsgs.reduce((m,r)=>Math.max(m,r.cnt),1);
  if(roomMsgs.length===0||max===0){
    barEl.innerHTML=`<div class="empty-tbl">메시지 데이터 없음</div>`;
  } else {
    barEl.innerHTML=roomMsgs.map(r=>{
      const pct=Math.round((r.cnt/max)*100)||2;
      return`<div class="bar-row">
        <div class="bar-lbl" title="${esc(r.name)}">${esc(r.name.substring(0,5))}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-val">${r.cnt}</div>
      </div>`;
    }).join('');
  }

  /* 활동 로그 */
  renderLog(users,rooms,msgs);
}

function renderLog(users,rooms,msgs){
  const logEl=document.getElementById('log-list');
  const logs=[];

  // 최근 가입 회원
  [...users].sort((a,b)=>new Date(b.joinedAt||0)-new Date(a.joinedAt||0)).slice(0,3).forEach(u=>{
    logs.push({dot:'ld-g',text:`${u.name}님이 가입했습니다`,time:relTime(u.joinedAt)});
  });
  // 최근 메시지
  const allMsgs=Object.values(msgs).flat().sort((a,b)=>b.ts-a.ts).slice(0,3);
  allMsgs.forEach(m=>{
    const room=rooms.find(r=>Object.keys(msgs).find(id=>msgs[id]?.includes(m)&&id===r.id));
    logs.push({dot:'ld-g',text:`새 메시지: "${(m.text||'이미지').substring(0,20)}"`,time:relTime(m.ts)});
  });
  // 채팅방 생성
  [...rooms].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,2).forEach(r=>{
    logs.push({dot:'ld-y',text:`채팅방 "${r.name}" 생성됨`,time:relTime(r.createdAt)});
  });

  if(logs.length===0){
    logEl.innerHTML=`<div class="empty-tbl">활동 기록 없음</div>`;
    return;
  }
  logs.sort((a,b)=>0);// keep order
  logEl.innerHTML=logs.slice(0,8).map(l=>`
    <div class="log-item">
      <div class="log-dot ${l.dot}"></div>
      <div class="log-txt">${esc(l.text)}</div>
      <div class="log-time">${l.time}</div>
    </div>`).join('');
}

function relTime(ts){
  if(!ts)return'–';
  const d=new Date(ts),now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60)return'방금';
  if(diff<3600)return Math.floor(diff/60)+'분 전';
  if(diff<86400)return Math.floor(diff/3600)+'시간 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}

/* ── 회원 삭제 ── */
function deleteUser(email){
  if(!confirm(`${email} 계정을 삭제하시겠습니까?`))return;
  const users=getUsers().filter(u=>u.email!==email);
  saveUsers(users);
  render();
  showToast('🗑️ 회원이 삭제되었습니다','ok');
}

/* ── 회원 추가 모달 ── */
function openAddModal(){document.getElementById('overlay').classList.add('show');}
function closeModal(){document.getElementById('overlay').classList.remove('show');clearAllFields();}
function outsideClose(e){if(e.target.id==='overlay')closeModal();}
function clearAllFields(){
  ['add-name','add-email','add-pw'].forEach(id=>{
    document.getElementById(id).value='';
    document.getElementById(id).classList.remove('ng');
  });
  ['err-name','err-email','err-pw'].forEach(id=>{
    const el=document.getElementById(id);el.textContent='';el.classList.remove('show');
  });
}
function clearErr(inputId,errId){
  document.getElementById(inputId).classList.remove('ng');
  const el=document.getElementById(errId);el.textContent='';el.classList.remove('show');
}
function showErr(inputId,errId,msg){
  document.getElementById(inputId).classList.add('ng');
  const el=document.getElementById(errId);el.textContent=msg;el.classList.add('show');
}

function doAddUser(){
  const name=document.getElementById('add-name').value.trim();
  const email=document.getElementById('add-email').value.trim();
  const pw=document.getElementById('add-pw').value;
  let ok=true;

  if(!name||name.length<2){showErr('add-name','err-name','이름은 2자 이상 입력해주세요');ok=false;}
  if(!email||!EMAIL_RE.test(email)){showErr('add-email','err-email','올바른 이메일 형식이 아닙니다');ok=false;}
  else if(getUsers().find(u=>u.email===email)){showErr('add-email','err-email','이미 등록된 이메일 주소입니다');ok=false;}

  const pwOk=pw.length>=6&&/[A-Z]/.test(pw)&&/[a-z]/.test(pw)&&/[0-9]/.test(pw);
  if(!pw||!pwOk){showErr('add-pw','err-pw','영문 대·소문자·숫자 포함 6자 이상이어야 합니다');ok=false;}

  if(!ok)return;

  const users=getUsers();
  users.push({name,email,pw,joinedAt:new Date().toISOString()});
  saveUsers(users);
  closeModal();
  render();
  showToast(`✅ ${name}님이 추가되었습니다`,'ok');
}

/* ── 유틸 ── */
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let _t;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast-el');
  el.textContent=msg;el.className=`toast show t-${type}`;
  clearTimeout(_t);_t=setTimeout(()=>el.className='toast',2600);
}

/* ── 초기 실행 + 자동 갱신 ── */
render();
setInterval(render, 5000); // 5초마다 갱신
</script>
