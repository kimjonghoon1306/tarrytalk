<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TARRYTALK — 채팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{--bg:#f0fdf7;--bg2:#fff;--surface:#e8faf2;--border:#c3eada;--text:#0d2b1e;--text2:#3d6b55;--accent:#00b874;--accent2:#00976b;--glow:rgba(0,184,116,.2);--shadow:rgba(0,100,60,.1);--out:#00b874;--in:#fff;--ot:#fff;--it:#0d2b1e;--sb:#f5fdf9;--hov:#e0f7ec;--inp:#f5fdf9;--tc:#7fc9a0;--ov:rgba(0,0,0,.5);}
:root[data-theme="dark"]{--bg:#0d1f16;--bg2:#122019;--surface:#1a2f21;--border:#2a4a35;--text:#d4f5e5;--text2:#7fc9a0;--accent:#00e08a;--accent2:#00b874;--glow:rgba(0,224,138,.15);--shadow:rgba(0,0,0,.4);--out:#00b874;--in:#1a2f21;--ot:#fff;--it:#d4f5e5;--sb:#0f1d15;--hov:#1f3626;--inp:#162a1e;--tc:#5a9a74;--ov:rgba(0,0,0,.7);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s;}
.app{display:flex;height:100%;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:310px;background:var(--sb);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:50;}
@media(max-width:680px){.sidebar{position:fixed;inset:0 auto 0 0;width:85vw;max-width:320px;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.18);}
.sidebar.open{transform:translateX(0);}}
.drawer-bg{display:none;position:fixed;inset:0;background:var(--ov);z-index:49;}
.drawer-bg.show{display:block;}
.sb-head{padding:14px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);}
.sb-logo{font-size:17px;font-weight:900;color:var(--accent);}
.sb-acts{display:flex;gap:6px;}
.ib{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;text-decoration:none;flex-shrink:0;}
.ib:hover,.ib:active{background:var(--accent);border-color:var(--accent);}
.new-btn{margin:10px 12px;padding:12px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px var(--glow);transition:all .2s;}
.new-btn:hover{transform:translateY(-1px);}
.sb-search{padding:0 12px 8px;position:relative;}
.sb-search::before{content:'🔍';position:absolute;left:23px;top:10px;font-size:12px;pointer-events:none;}
.s-inp{width:100%;padding:9px 12px 9px 32px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.s-inp:focus{border-color:var(--accent);}
.sb-tabs{display:flex;border-bottom:1.5px solid var(--border);}
.sbtab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);border-bottom:2.5px solid transparent;transition:all .2s;margin-bottom:-1.5px;}
.sbtab.on{color:var(--accent);border-bottom-color:var(--accent);}
.room-list{flex:1;overflow-y:auto;padding:6px 0;}
.room-list::-webkit-scrollbar{width:3px;}
.room-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.empty-list{padding:48px 20px;text-align:center;color:var(--text2);}
.empty-list .ei{font-size:44px;margin-bottom:12px;}
.empty-list p{font-size:13px;line-height:1.7;white-space:pre-line;}
.room-item{display:flex;align-items:center;gap:11px;padding:12px 12px;cursor:pointer;transition:background .15s;}
.room-item:hover,.room-item:active{background:var(--hov);}
.room-item.on{background:var(--hov);border-left:3px solid var(--accent);}
.r-av{width:46px;height:46px;border-radius:15px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;font-weight:700;}
.r-info{flex:1;min-width:0;}
.r-name{font-weight:700;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-prev{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.r-time{font-size:11px;color:var(--text2);}
.badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;min-width:20px;text-align:center;}
.sb-foot{padding:10px 12px;border-top:1.5px solid var(--border);display:flex;gap:5px;}
.fb{flex:1;padding:9px;border-radius:10px;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;}
.fb:hover,.fb:active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* MAIN */
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--bg2);min-width:0;overflow:hidden;}
.topbar{padding:12px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;min-height:58px;}
.menu-btn{display:none;width:36px;height:36px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
@media(max-width:680px){.menu-btn{display:flex;}}
.tb-av{width:40px;height:40px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700;}
.tb-info{flex:1;min-width:0;}
.tb-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;}
.tb-acts{display:flex;gap:6px;flex-shrink:0;}

/* 메시지 */
.msg-wrap{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);text-align:center;padding:40px;}
.ce-icon{font-size:60px;opacity:.35;}
.chat-empty h2{font-size:19px;font-weight:800;color:var(--text);}
.chat-empty p{font-size:13px;line-height:1.7;max-width:260px;}
@media(max-width:680px){.chat-empty{display:none!important;}}
.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.date-sep{text-align:center;font-size:11px;color:var(--text2);font-weight:600;position:relative;margin:3px 0;}
.date-sep::before,.date-sep::after{content:'';position:absolute;top:50%;width:36%;height:1px;background:var(--border);}
.date-sep::before{left:0;}.date-sep::after{right:0;}
.sys-msg{align-self:center;background:var(--surface);border-radius:50px;padding:5px 14px;font-size:11px;color:var(--text2);}
.mg{display:flex;gap:8px;align-items:flex-end;}
.mg.out{flex-direction:row-reverse;}
.mg-av{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;align-self:flex-end;background:linear-gradient(135deg,#68d391,#38a169);}
.mg-body{display:flex;flex-direction:column;gap:3px;max-width:70%;}
@media(max-width:480px){.mg-body{max-width:80%;}}
.mg.out .mg-body{align-items:flex-end;}
.mg-sender{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:1px;}
.mg.out .mg-sender{display:none;}
.bubble{padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;box-shadow:0 1px 4px var(--shadow);}
.mg.out .bubble{background:var(--out);color:var(--ot);border-bottom-right-radius:4px;}
.mg:not(.out) .bubble{background:var(--in);color:var(--it);border-bottom-left-radius:4px;border:1.5px solid var(--border);}
.img-bub{max-width:220px;border-radius:14px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;}
.img-bub img{width:100%;display:block;object-fit:cover;max-height:190px;}
.img-cap{padding:6px 10px;font-size:11px;background:var(--surface);color:var(--text2);}
.img-cap a{color:var(--accent);text-decoration:none;}
.mg-meta{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tc);}
.mg.out .mg-meta{flex-direction:row-reverse;}
.chk{color:var(--accent);}

/* 게스트 월 */
.guest-wall{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);backdrop-filter:blur(3px);z-index:10;}
.gw-box{background:var(--bg2);border-radius:20px;padding:26px 22px;text-align:center;max-width:290px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.25);}
.gw-box h3{font-size:16px;font-weight:800;margin-bottom:8px;}
.gw-box p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.gw-btns{display:flex;gap:8px;}
.gw-login{flex:1;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.gw-signup{flex:1;padding:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* INPUT */
.input-wrap{border-top:1.5px solid var(--border);background:var(--bg2);flex-shrink:0;}
.emoji-row{display:flex;gap:4px;padding:7px 12px 3px;overflow-x:auto;scrollbar-width:none;}
.emoji-row::-webkit-scrollbar{display:none;}
.ep{padding:6px 10px;border-radius:50px;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;font-size:15px;flex-shrink:0;transition:all .15s;}
.ep:hover,.ep:active{background:var(--accent);border-color:var(--accent);transform:scale(1.1);}
.tool-row{display:flex;gap:5px;padding:4px 12px 7px;}
.tb2{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s;flex-shrink:0;}
.tb2:hover,.tb2:active{background:var(--accent);border-color:var(--accent);}
.link-row{display:none;align-items:center;gap:7px;margin:0 12px 7px;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:7px 10px;}
.link-row.show{display:flex;}
.l-inp{flex:1;background:none;border:none;outline:none;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);}
.l-inp::placeholder{color:var(--text2);opacity:.5;}
.l-send{padding:5px 11px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.l-x{cursor:pointer;font-size:16px;color:var(--text2);background:none;border:none;}
.inp-row{display:flex;gap:8px;align-items:flex-end;padding:0 12px 12px;}
.m-inp{flex:1;padding:11px 15px;background:var(--inp);border:1.5px solid var(--border);border-radius:24px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;max-height:120px;min-height:46px;line-height:1.5;transition:border-color .2s;-webkit-appearance:none;}
.m-inp:focus{border-color:var(--accent);}
.m-inp::placeholder{color:var(--text2);opacity:.5;}
.send-btn{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 14px var(--glow);transition:all .2s;}
.send-btn:hover,.send-btn:active{transform:scale(1.08);}

/* MODAL */
.overlay{position:fixed;inset:0;background:var(--ov);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
@media(min-width:681px){.overlay{align-items:center;}.modal{border-radius:24px!important;max-height:85vh!important;}}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;display:flex;flex-direction:column;animation:shUp .3s cubic-bezier(.16,1,.3,1);overflow:hidden;}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-drag{width:36px;height:4px;border-radius:50px;background:var(--border);margin:9px auto 0;}
.modal-head{padding:14px 18px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);}
.modal-title{font-size:16px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
.type-sel{display:flex;gap:10px;padding:13px 18px;border-bottom:1.5px solid var(--border);}
.type-btn{flex:1;padding:13px;border-radius:14px;border:2px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text2);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.type-btn .ti{font-size:24px;}
.type-btn.on{border-color:var(--accent);background:rgba(0,184,116,.1);color:var(--accent);}
.room-name-row{padding:11px 18px;border-bottom:1.5px solid var(--border);display:none;}
.room-name-row.show{display:block;}
.rn-inp{width:100%;padding:11px 13px;background:var(--inp);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.rn-inp:focus{border-color:var(--accent);}
.chips-row{display:none;flex-wrap:wrap;gap:5px;padding:9px 18px;border-bottom:1.5px solid var(--border);}
.chips-row.show{display:flex;}
.chip{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:50px;background:rgba(0,184,116,.12);border:1.5px solid var(--accent);font-size:12px;font-weight:700;color:var(--accent);}
.chip-x{cursor:pointer;font-size:13px;opacity:.7;}
.m-search-row{padding:9px 18px;border-bottom:1.5px solid var(--border);position:relative;}
.m-search-row::before{content:'🔍';position:absolute;left:30px;top:19px;font-size:12px;pointer-events:none;}
.ms-inp{width:100%;padding:9px 13px 9px 32px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.ms-inp:focus{border-color:var(--accent);}
.m-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
.m-item{display:flex;align-items:center;gap:11px;padding:12px 18px;cursor:pointer;transition:background .15s;}
.m-item:hover,.m-item:active{background:var(--hov);}
.m-item.on{background:rgba(0,184,116,.07);}
.m-av{width:42px;height:42px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));}
.m-nm{font-size:14px;font-weight:700;}
.m-em{font-size:12px;color:var(--text2);}
.m-check{width:23px;height:23px;border-radius:50%;border:2px solid var(--border);margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;}
.m-item.on .m-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.no-m{padding:28px;text-align:center;color:var(--text2);font-size:13px;line-height:1.7;}
.modal-foot{padding:13px 18px;border-top:1.5px solid var(--border);}
.create-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 6px 18px var(--glow);transition:all .2s;}
.create-btn:disabled{opacity:.4;cursor:not-allowed;}

/* 이미 있는 방 */
.exist-modal{background:var(--bg2);border-radius:20px;width:300px;max-width:88vw;padding:26px 22px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:shUp .3s cubic-bezier(.16,1,.3,1);}
.ex-icon{font-size:42px;margin-bottom:11px;}
.ex-title{font-size:16px;font-weight:800;margin-bottom:7px;}
.ex-desc{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.ex-btns{display:flex;gap:8px;}
.ex-go{flex:1;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.ex-no{flex:1;padding:11px;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:13px;padding:11px 20px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.t-ok{background:var(--accent);color:#fff;}
.t-warn{background:#ed8936;color:#fff;}
.t-info{background:var(--bg2);color:var(--text);border:1.5px solid var(--border);}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">💬 TARRYTALK</div>
    <div class="sb-acts">
      <div class="ib" onclick="toggleTheme()"><span id="ti">🌙</span></div>
      <a href="profile.html" class="ib">👤</a>
    </div>
  </div>
  <button class="new-btn" onclick="openModal()">✏️ 새로운 채팅 시작</button>
  <div class="sb-search">
    <input class="s-inp" type="text" placeholder="채팅방 검색..." oninput="filterRooms(this.value)">
  </div>
  <div class="sb-tabs">
    <div class="sbtab on" id="tab-g" onclick="setTab('group')">단체채팅</div>
    <div class="sbtab"    id="tab-d" onclick="setTab('dm')">1대1 채팅</div>
  </div>
  <div class="room-list" id="room-list"></div>
  <div class="sb-foot">
    <a href="index.html"   class="fb">🏠 홈</a>
    <a href="admin.html"   class="fb">⚙️ 관리</a>
    <a href="profile.html" class="fb">👤 나</a>
  </div>
</div>
<div class="drawer-bg" id="drawer-bg" onclick="closeSb()"></div>

<!-- MAIN -->
<div class="chat-main" id="chat-main">
  <div class="topbar">
    <div class="menu-btn ib" onclick="openSb()">☰</div>
    <div class="tb-av"   id="tb-av"   style="display:none">💬</div>
    <div class="tb-info" id="tb-info" style="display:none">
      <div class="tb-name" id="tb-name"></div>
      <div class="tb-sub"  id="tb-sub"></div>
    </div>
    <div id="tb-logo" style="flex:1;font-size:16px;font-weight:900;color:var(--accent);">💬 TARRYTALK</div>
    <div class="tb-acts">
      <div class="ib" id="tb-s" style="display:none" onclick="showToast('🔍 준비 중','info')">🔍</div>
      <div class="ib" id="tb-c" style="display:none" onclick="showToast('📞 준비 중','info')">📞</div>
    </div>
  </div>
  <div class="msg-wrap">
    <div class="chat-empty" id="chat-empty">
      <div class="ce-icon">💬</div>
      <h2>채팅을 시작해보세요!</h2>
      <p>왼쪽에서 채팅방을 선택하거나<br><b>새로운 채팅 시작</b>을 눌러보세요.</p>
    </div>
    <div class="messages" id="messages" style="display:none;"></div>
    <div class="guest-wall" id="guest-wall" style="display:none;">
      <div class="gw-box">
        <h3>🔒 로그인이 필요해요</h3>
        <p>채팅 내용을 보려면<br>로그인하거나 회원가입을 해주세요.</p>
        <div class="gw-btns">
          <button class="gw-login"  onclick="location.href='index.html'">로그인</button>
          <button class="gw-signup" onclick="location.href='index.html'">회원가입</button>
        </div>
      </div>
    </div>
  </div>
  <div class="input-wrap" id="input-wrap" style="display:none;">
    <div class="emoji-row">
      <div class="ep" onclick="addEmoji('😄')">😄</div><div class="ep" onclick="addEmoji('👍')">👍</div>
      <div class="ep" onclick="addEmoji('🎉')">🎉</div><div class="ep" onclick="addEmoji('🔥')">🔥</div>
      <div class="ep" onclick="addEmoji('❤️')">❤️</div><div class="ep" onclick="addEmoji('😂')">😂</div>
      <div class="ep" onclick="addEmoji('🙏')">🙏</div><div class="ep" onclick="addEmoji('✅')">✅</div>
    </div>
    <div class="link-row" id="link-row">
      <input class="l-inp" id="l-inp" placeholder="이미지 URL (https://...)" onkeydown="if(event.key==='Enter')sendImg()">
      <button class="l-send" onclick="sendImg()">전송</button>
      <button class="l-x" onclick="toggleLink()">✕</button>
    </div>
    <div class="tool-row">
      <div class="tb2" onclick="showToast('📎 첨부','info')">📎</div>
      <div class="tb2" onclick="toggleLink()">🖼️</div>
      <div class="tb2" onclick="showToast('📊 투표','info')">📊</div>
    </div>
    <div class="inp-row">
      <textarea class="m-inp" id="m-inp" placeholder="메시지를 입력하세요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
</div>

<!-- NEW CHAT MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <div class="modal-title">✏️ 새로운 채팅 시작</div>
      <div class="modal-x" onclick="closeModal()">✕</div>
    </div>
    <div class="type-sel">
      <button class="type-btn on" id="bt-dm"    onclick="setType('dm')"><span class="ti">👤</span>1대1 채팅</button>
      <button class="type-btn"    id="bt-group" onclick="setType('group')"><span class="ti">👥</span>단체채팅</button>
    </div>
    <div class="room-name-row" id="room-name-row">
      <input class="rn-inp" id="rn-inp" placeholder="채팅방 이름 입력" oninput="updateBtn()">
    </div>
    <div class="chips-row" id="chips-row"></div>
    <div class="m-search-row">
      <input class="ms-inp" id="ms-inp" placeholder="이름·이메일 검색..." oninput="filterMembers(this.value)">
    </div>
    <div class="m-list" id="m-list"></div>
    <div class="modal-foot">
      <button class="create-btn" id="create-btn" onclick="doCreate()" disabled>멤버를 선택하세요</button>
    </div>
  </div>
</div>

<!-- 중복 방 알림 -->
<div class="overlay" id="exist-ov">
  <div class="exist-modal">
    <div class="ex-icon">💬</div>
    <div class="ex-title">이미 채팅방이 있어요!</div>
    <div class="ex-desc" id="ex-desc"></div>
    <div class="ex-btns">
      <button class="ex-go" onclick="goExist()">바로 이동</button>
      <button class="ex-no" onclick="closeExist()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast-el"></div>
<script>
const K={USERS:'tt_users',SESSION:'tt_session',ROOMS:'tt_rooms',MSGS:'tt_messages',THEME:'tt_theme'};
const COLS=['linear-gradient(135deg,#68d391,#276749)','linear-gradient(135deg,#f6ad55,#c05621)','linear-gradient(135deg,#76e4f7,#0987a0)','linear-gradient(135deg,#d6bcfa,#6b46c1)','linear-gradient(135deg,#fbb6ce,#b83280)','linear-gradient(135deg,#90cdf4,#2b6cb0)'];
let sess=null,isGuest=false,curRoom=null,curTab='group',selType='dm',selUsers=[],existId=null;
try{sess=JSON.parse(localStorage.getItem(K.SESSION));}catch(e){}
const urlP=new URLSearchParams(location.search);
isGuest=urlP.get('guest')==='1'||(sess&&sess.role==='guest');
if(!localStorage.getItem(K.ROOMS))localStorage.setItem(K.ROOMS,'[]');
if(!localStorage.getItem(K.MSGS))localStorage.setItem(K.MSGS,'{}');
const getRooms=()=>JSON.parse(localStorage.getItem(K.ROOMS)||'[]');
const getMsgs=()=>JSON.parse(localStorage.getItem(K.MSGS)||'{}');
const getUsers=()=>JSON.parse(localStorage.getItem(K.USERS)||'[]');
const saveRooms=r=>localStorage.setItem(K.ROOMS,JSON.stringify(r));
const saveMsgs=m=>localStorage.setItem(K.MSGS,JSON.stringify(m));
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtTime(ts){const d=new Date(ts),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return`${h>=12?'오후':'오전'} ${h>12?h-12:h||12}:${m}`;}
function toggleTheme(){const h=document.documentElement,d=h.dataset.theme==='dark';h.dataset.theme=d?'light':'dark';document.getElementById('ti').textContent=d?'🌙':'☀️';localStorage.setItem(K.THEME,h.dataset.theme);}
(()=>{const t=localStorage.getItem(K.THEME);if(t)document.documentElement.dataset.theme=t;if(document.documentElement.dataset.theme==='dark')document.getElementById('ti').textContent='☀️';})();
function openSb(){document.getElementById('sidebar').classList.add('open');document.getElementById('drawer-bg').classList.add('show');}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('drawer-bg').classList.remove('show');}
function setTab(t){curTab=t;document.getElementById('tab-g').classList.toggle('on',t==='group');document.getElementById('tab-d').classList.toggle('on',t==='dm');renderRooms();}
function renderRooms(filter){
  const list=document.getElementById('room-list');
  let rooms=getRooms().filter(r=>r.type===curTab);
  if(filter)rooms=rooms.filter(r=>r.name.toLowerCase().includes(filter.toLowerCase()));
  if(rooms.length===0){list.innerHTML=`<div class="empty-list"><div class="ei">${curTab==='group'?'👥':'💬'}</div><p>${curTab==='group'?'단체채팅방이 없어요.\n새로운 채팅 시작을 눌러\n방을 만들어보세요!':'1대1 채팅이 없어요.\n새로운 채팅 시작을 눌러\n대화를 시작해보세요!'}</p></div>`;return;}
  rooms.sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
  list.innerHTML=rooms.map(r=>{
    const msgs=getMsgs()[r.id]||[];const last=msgs[msgs.length-1];
    const prev=last?(last.type==='image'?'📷 이미지':last.text):'대화를 시작하세요';
    const time=last?fmtTime(last.ts):'';const unread=r.unread||0;
    return`<div class="room-item${curRoom===r.id?' on':''}" onclick="openRoom('${r.id}')"><div class="r-av" style="background:${r.color||COLS[0]}">${r.emoji||'💬'}</div><div class="r-info"><div class="r-name">${esc(r.name)}</div><div class="r-prev">${esc(prev.substring(0,28))}</div></div><div class="r-meta"><span class="r-time">${time}</span>${unread>0?`<span class="badge">${unread}</span>`:''}</div></div>`;
  }).join('');
}
function filterRooms(v){renderRooms(v);}
function openRoom(id){
  curRoom=id;const rooms=getRooms(),room=rooms.find(r=>r.id===id);if(!room)return;
  room.unread=0;saveRooms(rooms);renderRooms();
  document.getElementById('tb-av').style.display='flex';document.getElementById('tb-av').textContent=room.emoji||'💬';
  document.getElementById('tb-info').style.display='block';document.getElementById('tb-name').textContent=room.name;
  document.getElementById('tb-sub').textContent=room.type==='group'?`● 멤버 ${room.members.length}명`:'● 1대1 채팅';
  document.getElementById('tb-logo').style.display='none';
  document.getElementById('tb-s').style.display='flex';document.getElementById('tb-c').style.display='flex';
  document.getElementById('chat-empty').style.display='none';
  document.getElementById('messages').style.display='flex';
  if(isGuest){document.getElementById('messages').style.filter='blur(5px)';document.getElementById('guest-wall').style.display='flex';document.getElementById('input-wrap').style.display='none';}
  else{document.getElementById('messages').style.filter='';document.getElementById('guest-wall').style.display='none';document.getElementById('input-wrap').style.display='block';}
  renderMsgs(id);closeSb();
}
function renderMsgs(id){
  const msgs=getMsgs()[id]||[],el=document.getElementById('messages');el.innerHTML='';
  if(msgs.length===0){el.innerHTML='<div class="sys-msg">대화를 시작해보세요 👋</div>';}
  else{let ld='';msgs.forEach(m=>{const d=new Date(m.ts).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});if(d!==ld){const s=document.createElement('div');s.className='date-sep';s.textContent=d;el.appendChild(s);ld=d;}el.appendChild(buildMsg(m));});}
  el.scrollTop=el.scrollHeight;
}
function buildMsg(m){
  const mine=sess&&m.sender===sess.email,name=m.senderName||m.sender,color=m.senderColor||COLS[0];
  const el=document.createElement('div');el.className='mg'+(mine?' out':'');
  let bub=m.type==='image'?`<div class="img-bub"><img src="${esc(m.url)}" alt="이미지" onerror="this.style.display='none'"><div class="img-cap">🖼️ <a href="${esc(m.url)}" target="_blank">원본 보기</a></div></div>`:`<div class="bubble">${esc(m.text).replace(/\n/g,'<br>')}</div>`;
  el.innerHTML=`<div class="mg-av" style="background:${color}">${name.charAt(0)}</div><div class="mg-body"><div class="mg-sender">${esc(name)}</div>${bub}<div class="mg-meta"><span>${fmtTime(m.ts)}</span>${mine?'<span class="chk">✓✓</span>':''}</div></div>`;
  return el;
}
function sendMsg(){
  if(!curRoom||!sess)return;
  const inp=document.getElementById('m-inp'),text=inp.value.trim();if(!text)return;
  addMsg(curRoom,{id:uid(),type:'text',text,sender:sess.email,senderName:sess.name,senderColor:'linear-gradient(135deg,var(--accent),var(--accent2))',ts:Date.now()});
  inp.value='';inp.style.height='auto';
  const room=getRooms().find(r=>r.id===curRoom);
  if(room){const others=room.members.filter(e=>e!==sess.email);if(others.length){const u=getUsers().find(u=>u.email===others[0]);if(u)setTimeout(()=>{const rep=['알겠습니다! 👍','감사해요 😄','확인했어요!','좋아요!','네 🙏','ㅋㅋ 맞아요!','잠깐만요...','오케이!'];addMsg(curRoom,{id:uid(),type:'text',text:rep[Math.floor(Math.random()*rep.length)],sender:u.email,senderName:u.name,senderColor:COLS[1],ts:Date.now()});},800+Math.random()*900);}}
}
function sendImg(){
  if(!curRoom||!sess)return;const inp=document.getElementById('l-inp'),url=inp.value.trim();if(!url)return;
  const isImg=/\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?.*)?$/i.test(url);
  addMsg(curRoom,{id:uid(),type:isImg?'image':'text',text:isImg?'':url,url:isImg?url:undefined,sender:sess.email,senderName:sess.name,senderColor:'linear-gradient(135deg,var(--accent),var(--accent2))',ts:Date.now()});
  inp.value='';document.getElementById('link-row').classList.remove('show');
}
function addMsg(roomId,msg){
  const all=getMsgs();if(!all[roomId])all[roomId]=[];all[roomId].push(msg);saveMsgs(all);
  const rooms=getRooms(),room=rooms.find(r=>r.id===roomId);
  if(room){room.lastMsg=msg.text||'이미지';room.lastTs=msg.ts;saveRooms(rooms);}
  if(curRoom===roomId){const el=document.getElementById('messages');el.appendChild(buildMsg(msg));el.scrollTop=el.scrollHeight;renderRooms();}
}
function openModal(){
  if(isGuest){showToast('로그인 후 이용 가능합니다','warn');return;}
  if(!sess){location.href='index.html';return;}
  selUsers=[];selType='dm';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('room-name-row').classList.remove('show');
  document.getElementById('chips-row').classList.remove('show');
  document.getElementById('chips-row').innerHTML='';
  document.getElementById('ms-inp').value='';document.getElementById('rn-inp').value='';
  document.getElementById('bt-dm').classList.add('on');document.getElementById('bt-group').classList.remove('on');
  document.getElementById('create-btn').disabled=true;document.getElementById('create-btn').textContent='멤버를 선택하세요';
  renderMembers('');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function outsideClose(e){if(e.target.id==='overlay')closeModal();}
function setType(t){
  selType=t;selUsers=[];
  document.getElementById('bt-dm').classList.toggle('on',t==='dm');document.getElementById('bt-group').classList.toggle('on',t==='group');
  document.getElementById('room-name-row').classList.toggle('show',t==='group');
  updateChips();renderMembers('');updateBtn();
}
function renderMembers(filter){
  const users=getUsers().filter(u=>u.email!==sess?.email),list=document.getElementById('m-list');
  let f=users;if(filter){const q=filter.toLowerCase();f=users.filter(u=>u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));}
  if(f.length===0){list.innerHTML=`<div class="no-m">${users.length===0?'아직 가입된 다른 회원이 없습니다 😅<br>먼저 회원가입을 해주세요!':'검색 결과가 없습니다'}</div>`;return;}
  list.innerHTML=f.map((u,i)=>{const on=selUsers.includes(u.email);return`<div class="m-item${on?' on':''}" onclick="toggleMember('${u.email}','${u.name.replace(/'/g,"\\'")}')"><div class="m-av" style="background:${COLS[i%COLS.length]}">${u.name.charAt(0)}</div><div style="flex:1;min-width:0"><div class="m-nm">${esc(u.name)}</div><div class="m-em">${esc(u.email)}</div></div><div class="m-check">${on?'✓':''}</div></div>`;}).join('');
}
function toggleMember(email,name){
  if(selType==='dm'){selUsers=selUsers.includes(email)?[]:[email];}
  else{selUsers.includes(email)?selUsers=selUsers.filter(e=>e!==email):selUsers.push(email);}
  updateChips();renderMembers(document.getElementById('ms-inp').value);updateBtn();
}
function updateChips(){
  const wrap=document.getElementById('chips-row'),users=getUsers();
  if(selUsers.length===0){wrap.classList.remove('show');wrap.innerHTML='';return;}
  wrap.classList.add('show');
  wrap.innerHTML=selUsers.map(e=>{const u=users.find(u=>u.email===e);return`<div class="chip">${esc(u?u.name:e)}<span class="chip-x" onclick="toggleMember('${e}','')">✕</span></div>`;}).join('');
}
function updateBtn(){
  const btn=document.getElementById('create-btn');
  const ok=selUsers.length>0&&(selType==='dm'||document.getElementById('rn-inp').value.trim());
  btn.disabled=!ok;btn.textContent=selType==='dm'?(selUsers.length>0?'1대1 채팅 시작':'멤버를 선택하세요'):(selUsers.length>0?`단체채팅방 만들기 (${selUsers.length+1}명)`:'멤버를 선택하세요');
}
document.getElementById('rn-inp').addEventListener('input',updateBtn);
function filterMembers(v){renderMembers(v);}
function doCreate(){
  if(!sess||selUsers.length===0)return;
  const members=[sess.email,...selUsers],rooms=getRooms();
  if(selType==='dm'){
    const exist=rooms.find(r=>r.type==='dm'&&r.members.length===2&&members.every(e=>r.members.includes(e)));
    if(exist){const users=getUsers(),other=users.find(u=>u.email===selUsers[0]);existId=exist.id;document.getElementById('ex-desc').textContent=`"${other?other.name:selUsers[0]}"님과의 채팅방이 이미 있어요!`;closeModal();document.getElementById('exist-ov').classList.add('show');return;}
    const users=getUsers(),other=users.find(u=>u.email===selUsers[0]);
    const room={id:uid(),type:'dm',name:other?other.name:selUsers[0],emoji:other?other.name.charAt(0):'👤',color:COLS[1],members,createdAt:Date.now(),unread:0};
    rooms.push(room);saveRooms(rooms);closeModal();setTab('dm');openRoom(room.id);showToast(`💬 ${room.name}님과 채팅 시작!`,'ok');
  } else {
    const rName=document.getElementById('rn-inp').value.trim();if(!rName){showToast('채팅방 이름을 입력해주세요','warn');return;}
    const exist=rooms.find(r=>r.type==='group'&&r.name===rName);
    if(exist){existId=exist.id;document.getElementById('ex-desc').textContent=`"${rName}" 이름의 채팅방이 이미 있어요!`;closeModal();document.getElementById('exist-ov').classList.add('show');return;}
    const room={id:uid(),type:'group',name:rName,emoji:'👥',color:COLS[Math.floor(Math.random()*COLS.length)],members,createdAt:Date.now(),unread:0};
    rooms.push(room);saveRooms(rooms);
    addMsg(room.id,{id:uid(),type:'text',text:`${sess.name}님이 채팅방을 만들었습니다.`,sender:'system',senderName:'시스템',senderColor:'#aaa',ts:Date.now()});
    closeModal();setTab('group');openRoom(room.id);showToast(`🎉 "${rName}" 채팅방 생성!`,'ok');
  }
}
function goExist(){document.getElementById('exist-ov').classList.remove('show');if(existId){const room=getRooms().find(r=>r.id===existId);if(room){setTab(room.type);openRoom(existId);}}}
function closeExist(){document.getElementById('exist-ov').classList.remove('show');}
function addEmoji(e){const inp=document.getElementById('m-inp');inp.value+=e;inp.focus();}
function toggleLink(){document.getElementById('link-row').classList.toggle('show');}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
let _t;function showToast(msg,type='ok'){const el=document.getElementById('toast-el');el.textContent=msg;el.className=`toast show t-${type}`;clearTimeout(_t);_t=setTimeout(()=>el.className='toast',2600);}
renderRooms();
</script>
</body>
</html>
