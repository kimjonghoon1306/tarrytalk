<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>온메신저 — 프로필</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
/* 저장된 앱 테마색 즉시 적용 (FOUC 방지) — 회원 개인 색은 이 기기(localStorage)에 저장 */
(function(){try{var raw=localStorage.getItem('tt_theme_color');if(!raw)return;var t=JSON.parse(raw);var dark=document.documentElement.getAttribute('data-theme')==='dark';var c=dark?t.dark:t.light;if(!c)return;var s=document.documentElement.style;s.setProperty('--green',c.g);s.setProperty('--green-rgb',c.rgb);s.setProperty('--green2',c.g2);s.setProperty('--out-bubble',c.g);if(c.g3)s.setProperty('--green3',c.g3);}catch(e){}})();
</script>
<style>
:root[data-theme="light"]{
  --bg:#f5f3ff;--bg2:#ffffff;--bg3:#faf8ff;
  --surface:#ffffff;--surface2:#f3eefc;
  --border:rgba(var(--green-rgb),.14);--border2:rgba(var(--green-rgb),.26);
  --text:#21172f;--text2:#5b4b7a;--text3:#8b7aa8;
  --green:#7c3aed;--green-rgb:124,58,237;--green2:#6d28d9;--glow:rgba(var(--green-rgb),.14);--glow2:rgba(var(--green-rgb),.25);
  --red:#e0223a;--red-bg:rgba(224,34,58,.08);
}
:root[data-theme="dark"]{
  --bg:#1a1622;--bg2:#221c2e;--bg3:#2a2238;
  --surface:#271f35;--surface2:#322847;
  --border:rgba(var(--green-rgb),.14);--border2:rgba(var(--green-rgb),.26);
  --text:#f4efff;--text2:#d8c4ff;--text3:#a99ac4;
  --green:#a855f7;--green-rgb:168,85,247;--green2:#7c3aed;--glow:rgba(var(--green-rgb),.22);--glow2:rgba(var(--green-rgb),.38);
  --red:#ff4f6a;--red-bg:rgba(255,79,106,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input{font-family:inherit;outline:none;}
a{text-decoration:none;color:inherit;}
button,.back-btn,.profile-hero,.section,.info-row,.primary-btn,.secondary-btn,.danger-btn,.profile-badge{transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s,border-color .18s,background .18s,color .18s;will-change:transform;}
button{position:relative;overflow:hidden;}
button::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.28),transparent 34%);opacity:0;transform:scale(.8);transition:opacity .35s,transform .35s;pointer-events:none;}
button:active::after{opacity:.55;transform:scale(1.8);transition:0s;}
button:active,.section:active,.info-row:active{transform:scale(.98);}

/* ── 레이아웃 ── */
.page{max-width:980px;margin:0 auto;padding:20px 20px 60px;}
.prof-grid>*{margin-bottom:14px;}
@media(min-width:780px){.prof-grid{column-count:2;column-gap:14px;}.profile-hero{column-span:all;}.prof-grid>*{break-inside:avoid;}}
.theme-btn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);transition:all .2s;margin-left:auto;}
.theme-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px var(--glow);}

/* ── 탑바 ── */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 0 20px;}
.back-btn{width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--text2);transition:all .2s;}
.back-btn:hover{background:var(--green);color:#fff;border-color:var(--green);transform:translateY(-2px);box-shadow:0 10px 24px var(--glow);}
.topbar-title{font-size:17px;font-weight:800;}

/* ── 프로필 히어로 ── */
.profile-hero{
  background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:24px;
  padding:38px 24px;text-align:center;margin-bottom:0;color:#fff;
  position:relative;overflow:hidden;animation:itemIn .32s ease both;
  box-shadow:0 18px 44px rgba(var(--green-rgb),.32);
}
.profile-hero .profile-name{color:#fff;}
.profile-hero .profile-email{color:rgba(255,255,255,.85);}
.profile-hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);pointer-events:none;}
.profile-hero:hover,.section:hover{border-color:var(--border2);box-shadow:0 12px 32px rgba(var(--green-rgb),.12);transform:translateY(-2px);}
.profile-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
  border-radius:50%;background:radial-gradient(circle,rgba(var(--green-rgb),.14),transparent 70%);
  pointer-events:none;
}
.av-wrap{position:relative;display:inline-block;margin-bottom:16px;}
.av-big{
  width:88px;height:88px;border-radius:26px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:900;color:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,.4);animation:avatarFloat 4.8s ease-in-out infinite;
}
.av-online{
  position:absolute;bottom:4px;right:4px;width:14px;height:14px;
  border-radius:50%;background:var(--green);border:2px solid var(--bg3);
  box-shadow:0 0 6px var(--green);
}
.profile-name{font-size:22px;font-weight:900;margin-bottom:4px;}
.profile-email{font-size:13px;color:var(--text3);margin-bottom:12px;}
.profile-badge{display:inline-block;padding:4px 14px;border-radius:50px;font-size:11px;font-weight:800;background:rgba(var(--green-rgb),.14);border:1px solid var(--border2);color:var(--green);}

/* ── 섹션 ── */
.section{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:14px;animation:itemIn .3s ease both;}
.sec-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;}

/* ── 폼 필드 ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:800;color:var(--text3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.field input{
  width:100%;padding:13px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:13px;color:var(--text);font-size:14px;transition:border-color .2s;
}
.field input:focus{border-color:var(--green);}
.field input::placeholder{color:var(--text3);}
.field input:disabled{opacity:.5;cursor:not-allowed;}
.field-hint{font-size:11px;color:var(--text3);margin-top:5px;}

/* ── 버튼 ── */
.primary-btn{
  width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--green2));
  border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 16px var(--glow);transition:all .18s;background-size:180% 180%;animation:ctaShift 7s ease-in-out infinite;
}
.primary-btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px var(--glow2);}
.primary-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.secondary-btn{
  width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);
  border-radius:13px;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;
}
.secondary-btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-2px);box-shadow:0 10px 24px var(--glow);}
.danger-btn{
  width:100%;padding:13px;background:var(--red-bg);border:1px solid rgba(255,79,106,.2);
  border-radius:13px;color:var(--red);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;
}
.danger-btn:hover{background:var(--red);color:#fff;transform:translateY(-2px);box-shadow:0 10px 24px rgba(255,79,106,.22);}

/* ── 비번 강도 ── */
.pw-bar-wrap{margin-top:8px;}
.pw-bar{height:4px;border-radius:4px;background:var(--surface2);overflow:hidden;}
.pw-fill{height:100%;border-radius:4px;transition:width .4s,background .4s;}
.pw-hint{display:flex;justify-content:space-between;margin-top:6px;}
.pw-label{font-size:11px;font-weight:700;}
.pw-checks{display:flex;gap:8px;}
.pw-check{font-size:10px;font-weight:700;color:var(--text3);}
.pw-check.ok{color:var(--green);}

/* ── 정보 행 ── */
.info-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);animation:itemIn .26s ease both;}
.info-row:hover{background:rgba(var(--green-rgb),.06);border-radius:12px;padding-left:8px;padding-right:8px;}
.info-row:last-child{border-bottom:none;}
.info-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
.info-label{font-size:11px;color:var(--text3);font-weight:600;}
.info-value{font-size:14px;font-weight:600;margin-top:1px;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);border-radius:50px;padding:11px 22px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.t-ok{background:var(--green);color:#fff;}
.t-err{background:var(--red);color:#fff;}
.t-info{background:var(--bg2);color:var(--text);border:1px solid var(--border);}

/* ── 로딩 ── */
.loading-overlay{position:fixed;inset:0;background:rgba(26,22,34,.95);z-index:9999;display:flex;align-items:center;justify-content:center;}
.loading-overlay.hide{display:none;}
.spinner{width:32px;height:32px;border:3px solid rgba(var(--green-rgb),.15);border-top-color:var(--green);border-right-color:var(--green2);border-radius:50%;animation:spin .7s linear infinite,pulseRing 1.8s ease-in-out infinite;box-shadow:0 0 22px var(--glow);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseRing{50%{box-shadow:0 0 34px var(--glow2)}}
@keyframes ctaShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes avatarFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-3px) rotate(1.5deg)}}
@keyframes itemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.001ms!important;}
  button,.profile-hero,.section,.info-row,.av-big{transform:none!important;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>

<div class="page">
  <!-- 탑바 -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="topbar-title">내 프로필</div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="테마 전환">🌙</button>
  </div>

  <div class="prof-grid">
  <!-- 프로필 히어로 -->
  <div class="profile-hero">
    <div class="av-wrap">
      <div class="av-big" id="av-big">T</div>
      <div class="av-online"></div>
    </div>
    <div class="profile-name" id="prof-name">로딩 중...</div>
    <div class="profile-email" id="prof-email">로딩 중...</div>
    <span class="profile-badge" id="prof-badge">회원</span>
  </div>

  <!-- 계정 정보 -->
  <div class="section">
    <div class="sec-title">계정 정보</div>
    <div class="info-row">
      <div class="info-icon">📅</div>
      <div><div class="info-label">가입일</div><div class="info-value" id="info-joined">–</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">👥</div>
      <div><div class="info-label">친구 수</div><div class="info-value" id="info-msgs">–</div></div>
    </div>
    <div class="info-row">
      <div class="info-icon">🏠</div>
      <div><div class="info-label">참여 채팅방</div><div class="info-value" id="info-rooms">계산 중...</div></div>
    </div>
  </div>

  <!-- 이름 변경 -->
  <div class="section">
    <div class="sec-title">이름 변경</div>
    <div class="field">
      <label>표시 이름</label>
      <input type="text" id="name-inp" placeholder="새 이름 입력 (2자 이상)">
    </div>
    <button class="primary-btn" onclick="updateName()">이름 저장</button>
  </div>

  <!-- 상태 한마디 -->
  <div class="section">
    <div class="sec-title">상태 한마디</div>
    <div class="field">
      <label>지금 기분·소개 (친구 목록/프로필에 보여요)</label>
      <input type="text" id="status-inp" maxlength="60" placeholder="예) 오늘도 화이팅! 🌱">
    </div>
    <button class="primary-btn" onclick="updateStatus()">상태 저장</button>
  </div>

  <!-- 비밀번호 변경 -->
  <div class="section">
    <div class="sec-title">비밀번호 변경</div>
    <div class="field">
      <label>현재 비밀번호</label>
      <input type="password" id="cur-pw" placeholder="현재 비밀번호">
    </div>
    <div class="field">
      <label>새 비밀번호</label>
      <input type="password" id="new-pw" placeholder="대·소문자·숫자 포함 6자 이상" oninput="checkPwStrength(this.value)">
      <div class="pw-bar-wrap">
        <div class="pw-bar"><div class="pw-fill" id="pw-fill" style="width:0%"></div></div>
        <div class="pw-hint">
          <span class="pw-label" id="pw-label" style="color:var(--text3)"></span>
          <div class="pw-checks">
            <span class="pw-check" id="pc-len">6자+</span>
            <span class="pw-check" id="pc-up">대문자</span>
            <span class="pw-check" id="pc-lo">소문자</span>
            <span class="pw-check" id="pc-num">숫자</span>
          </div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>새 비밀번호 확인</label>
      <input type="password" id="new-pw2" placeholder="새 비밀번호 재입력">
    </div>
    <button class="primary-btn" onclick="updatePassword()">비밀번호 변경</button>
  </div>

  <!-- 아바타 색상 -->
  <div class="section">
    <div class="sec-title">아바타 색상</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;" id="color-picker"></div>
    <button class="secondary-btn" onclick="saveAvatarColor()">색상 저장</button>

    <div style="height:1px;background:var(--border);margin:22px 0;"></div>

    <div class="sec-title">앱 메인 색상 (테마)</div>
    <p style="font-size:12.5px;color:var(--text3);margin:-8px 0 14px;line-height:1.65;">앱 전체 강조색을 내 취향대로 바꿔요. 누르면 바로 적용되고 이 기기에 저장돼요.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;" id="theme-picker"></div>
    <button class="secondary-btn" onclick="resetThemeColor()">기본 색으로 되돌리기</button>
  </div>

  <!-- 알림음 -->
  <div class="section">
    <div class="sec-title">알림음</div>
    <div id="sound-list"></div>
    <div class="field-hint" style="margin-top:10px">앱을 켜둔 동안 울리는 새 메시지 알림음이에요. ▶로 미리 듣고 고르면 바로 저장됩니다. (앱이 꺼져 있을 땐 휴대폰 알림 설정의 소리·진동이 울려요)</div>
  </div>

  <!-- 기타 -->
  <div class="section">
    <div class="sec-title">기타</div>
    <button class="secondary-btn" onclick="location.href='chat.html'">💬 채팅으로 돌아가기</button>
    <button class="danger-btn" onclick="doLogout()">🚪 로그아웃</button>
  </div>
  </div>
</div>

<div class="toast" id="toast-el"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updateProfile,
         updatePassword as fbUpdatePassword, EmailAuthProvider, reauthenticateWithCredential,
         setPersistence, indexedDBLocalPersistence, browserLocalPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set, update, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyDC9qSmH-1z778oiI7QbDY_JrKis95z_C4",authDomain:"tarrytalk.firebaseapp.com",databaseURL:"https://tarrytalk-default-rtdb.firebaseio.com",projectId:"tarrytalk",storageBucket:"tarrytalk.firebasestorage.app",messagingSenderId:"322779846377",appId:"1:322779846377:web:12253ee2f2330dd1a04278"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);
const ADMIN_EMAIL='tarry9653@daum.net';
// 관리자가 정한 전체 기본색 로드 (개인 색을 안 고른 경우에만 적용)
get(ref(db,'settings/themeColor')).then(function(snap){var v=snap.val();if(v&&v.light){window.__adminTheme={light:v.light,dark:v.dark};if(!localStorage.getItem('tt_theme_color'))reapplyThemeColor();}}).catch(function(){});
window.addEventListener('storage',function(e){if(!e.key||e.key.indexOf('tt_theme')===0){reapplyThemeColor();if(typeof renderThemePicker==='function')renderThemePicker();}});
window.addEventListener('pageshow',function(){reapplyThemeColor();});
const authPersistenceReady=setPersistence(auth,indexedDBLocalPersistence).catch(()=>setPersistence(auth,browserLocalPersistence)).catch(()=>{});

const COLORS=['#00a84a','#0087d4','#a855f7','#e85d04','#d62828','#2ec4b6','#f59e0b','#ec4899'];

// ── 앱 테마(메인색) 프리셋 ── 라이트/다크 각각 메인색(g)·rgb·보조색(g2)
const THEME_PRESETS=[
  {key:'violet',name:'바이올렛',sw:'#7c3aed',light:{g:'#7c3aed',rgb:'124,58,237',g2:'#6d28d9'},dark:{g:'#a855f7',rgb:'168,85,247',g2:'#7c3aed'}},
  {key:'blue',name:'블루',sw:'#2563eb',light:{g:'#2563eb',rgb:'37,99,235',g2:'#1d4ed8'},dark:{g:'#60a5fa',rgb:'96,165,250',g2:'#3b82f6'}},
  {key:'teal',name:'민트',sw:'#0d9488',light:{g:'#0d9488',rgb:'13,148,136',g2:'#0f766e'},dark:{g:'#2dd4bf',rgb:'45,212,191',g2:'#14b8a6'}},
  {key:'rose',name:'로즈',sw:'#e11d63',light:{g:'#e11d63',rgb:'225,29,99',g2:'#be185d'},dark:{g:'#f472b6',rgb:'244,114,182',g2:'#ec4899'}},
  {key:'orange',name:'오렌지',sw:'#ea580c',light:{g:'#ea580c',rgb:'234,88,12',g2:'#c2410c'},dark:{g:'#fb923c',rgb:'251,146,60',g2:'#f97316'}},
  {key:'indigo',name:'인디고',sw:'#4f46e5',light:{g:'#4f46e5',rgb:'79,70,229',g2:'#4338ca'},dark:{g:'#818cf8',rgb:'129,140,248',g2:'#6366f1'}},
];
function _applyThemeObj(t){if(!t)return;var dark=document.documentElement.getAttribute('data-theme')==='dark';var c=dark?t.dark:t.light;if(!c)return;var s=document.documentElement.style;s.setProperty('--green',c.g);s.setProperty('--green-rgb',c.rgb);s.setProperty('--green2',c.g2);s.setProperty('--out-bubble',c.g);if(c.g3)s.setProperty('--green3',c.g3);}
function _curThemeKey(){try{return localStorage.getItem('tt_theme_key')||'violet';}catch(e){return 'violet';}}
window.__adminTheme=null;
window.reapplyThemeColor=function(){try{var raw=localStorage.getItem('tt_theme_color');if(raw){_applyThemeObj(JSON.parse(raw));return;}}catch(e){}if(window.__adminTheme)_applyThemeObj(window.__adminTheme);};
function renderThemePicker(){var cur=_curThemeKey();var box=document.getElementById('theme-picker');if(!box)return;box.innerHTML=THEME_PRESETS.map(function(p){return '<div onclick="selectTheme(\''+p.key+'\')" title="'+p.name+'" style="width:44px;height:44px;border-radius:13px;background:'+p.sw+';cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:900;border:2.5px solid '+(p.key===cur?'#fff':'transparent')+';box-shadow:'+(p.key===cur?'0 0 0 3px rgba(0,0,0,.2)':'0 2px 8px rgba(0,0,0,.12)')+';transition:all .2s;">'+(p.key===cur?'✓':'')+'</div>';}).join('');}
window.selectTheme=function(key){var p=THEME_PRESETS.find(function(x){return x.key===key;});if(!p)return;var t={light:p.light,dark:p.dark};try{localStorage.setItem('tt_theme_color',JSON.stringify(t));localStorage.setItem('tt_theme_key',key);}catch(e){}_applyThemeObj(t);renderThemePicker();showToast('🎨 앱 색상이 바뀌었어요','ok');};
window.resetThemeColor=function(){try{localStorage.removeItem('tt_theme_color');localStorage.removeItem('tt_theme_key');}catch(e){}var s=document.documentElement.style;['--green','--green-rgb','--green2','--out-bubble','--green3'].forEach(function(k){s.removeProperty(k);});renderThemePicker();showToast('기본 색으로 되돌렸어요','ok');};
renderThemePicker();
let currentUser=null, selectedColor=null, userProfile=null;
// 테마
{sessionStorage.removeItem('tt_theme');document.documentElement.dataset.theme='light';const b=document.getElementById('theme-btn');if(b)b.textContent='🌙';}
window.toggleTheme=function(){const d=document.documentElement.dataset.theme==='dark',n=d?'light':'dark';document.documentElement.dataset.theme=n;const b=document.getElementById('theme-btn');if(b)b.textContent=n==='dark'?'☀️':'🌙';sessionStorage.setItem('tt_theme',n);if(window.reapplyThemeColor)reapplyThemeColor();};

await authPersistenceReady;
onAuthStateChanged(auth, async user=>{
  if(!user){location.href='index.html';return;}
  currentUser=user;
  const snap=await get(ref(db,`users/${user.uid}`));
  userProfile=snap.val()||{};
  renderProfile();
  loadStats();
  // 알림음: Firebase 값을 기기에 동기화 + 다른 기기 변경 실시간 반영
  onValue(ref(db,`users/${user.uid}/notifySound`),snap=>{
    const v=snap.val();
    if(v)localStorage.setItem('tt_notify_sound',v);
    renderSounds();
  });
  document.getElementById('loading-overlay').classList.add('hide');
});

// ── 알림음 선택(앱 켜둔 동안). chat.html의 NOTIFY_SOUNDS와 동일해야 한다. localStorage로 공유. ──
const NOTIFY_SOUNDS={
  tok:{label:'🔔 톡톡 (기본)',play:(ctx,t0)=>{[0,0.09].forEach((d,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(i===0?1320:1560,t0+d);const t=t0+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.08);});}},
  ding:{label:'🎵 딩동',play:(ctx,t0)=>{[[0,988],[0.14,1319]].forEach(([d,f])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t0+d);const t=t0+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.3);});}},
  drop:{label:'💧 물방울',play:(ctx,t0)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(1600,t0);o.frequency.exponentialRampToValueAtTime(620,t0+0.18);g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(0.28,t0+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.22);o.connect(g);g.connect(ctx.destination);o.start(t0);o.stop(t0+0.24);}},
  chime:{label:'🎐 차임',play:(ctx,t0)=>{[[0,523],[0.1,659],[0.2,784]].forEach(([d,f])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t0+d);const t=t0+d;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.42);});}},
  none:{label:'🔕 무음',play:()=>{}},
};
let _audioCtx=null;
function _playSound(key){
  try{
    if(key==='none')return;
    _audioCtx=_audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==='suspended')_audioCtx.resume();
    (NOTIFY_SOUNDS[key]||NOTIFY_SOUNDS.tok).play(_audioCtx,_audioCtx.currentTime);
  }catch(e){}
}
function renderSounds(){
  const cur=localStorage.getItem('tt_notify_sound')||'tok';
  const list=document.getElementById('sound-list');
  if(!list)return;
  list.innerHTML=Object.entries(NOTIFY_SOUNDS).map(([k,v])=>`
    <div class="info-row" style="cursor:pointer" onclick="selectSound('${k}')">
      <div class="info-icon">${k===cur?'🔘':'⚪'}</div>
      <div style="flex:1"><div class="info-value">${v.label}</div></div>
      ${k==='none'?'':`<button class="secondary-btn" style="width:auto;padding:7px 14px;font-size:13px" onclick="event.stopPropagation();previewSound('${k}')">▶ 듣기</button>`}
    </div>`).join('');
}
window.selectSound=function(k){
  localStorage.setItem('tt_notify_sound',k);
  if(currentUser)update(ref(db,`users/${currentUser.uid}`),{notifySound:k}).catch(()=>{});
  renderSounds();_playSound(k);showToast('🔔 알림음이 저장됐어요','ok');
};
window.previewSound=function(k){_playSound(k);};
renderSounds();

function renderProfile(){
  const name=userProfile.displayName||currentUser.displayName||'사용자';
  const email=currentUser.email||'';
  const color=userProfile.avatarColor||COLORS[0];
  const isAdmin=currentUser.email===ADMIN_EMAIL||userProfile.isAdmin;

  const av=document.getElementById('av-big');
  av.textContent=name[0].toUpperCase();
  av.style.background=color;
  document.getElementById('prof-name').textContent=name;
  document.getElementById('prof-email').textContent=email;
  document.getElementById('prof-badge').textContent=isAdmin?'⚙️ 관리자':'● 회원';
  document.getElementById('name-inp').value=name;
  const si=document.getElementById('status-inp');if(si)si.value=userProfile.statusMsg||'';

  const joinedMs=userProfile.joinedAt||(currentUser.metadata?.creationTime?new Date(currentUser.metadata.creationTime).getTime():0);
  if(joinedMs){
    const d=new Date(joinedMs);
    document.getElementById('info-joined').textContent=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  }

  // 색상 피커
  selectedColor=color;
  const picker=document.getElementById('color-picker');
  picker.innerHTML=COLORS.map(c=>`
    <div onclick="selectColor('${c}')" style="
      width:44px;height:44px;border-radius:13px;background:${c};cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:18px;
      border:2.5px solid ${c===color?'#fff':'transparent'};
      box-shadow:${c===color?'0 0 0 3px rgba(168,85,247,.5)':'none'};
      transition:all .2s;
    " id="col-${c.replace('#','')}">${c===color?'✓':''}</div>`).join('');
}

async function loadStats(){
  const uid=currentUser.uid;
  // 친구 수 (내 프로필의 friends — 추가 읽기 불필요)
  const friendCount=userProfile.friends?Object.keys(userProfile.friends).length:0;
  document.getElementById('info-msgs').textContent=friendCount+'명';
  // 참여 채팅방 (내가 멤버인 방 수)
  try{
    const roomsSnap=await get(ref(db,'rooms'));
    const allRooms=roomsSnap.val()||{};
    const roomCount=Object.values(allRooms).filter(r=>r&&r.members?.[uid]).length;
    document.getElementById('info-rooms').textContent=roomCount+'개';
  }catch(e){
    document.getElementById('info-rooms').textContent='–';
  }
}

window.selectColor=function(color){
  selectedColor=color;
  COLORS.forEach(c=>{
    const el=document.getElementById('col-'+c.replace('#',''));
    if(!el)return;
    el.style.border=`2.5px solid ${c===color?'#fff':'transparent'}`;
    el.style.boxShadow=c===color?'0 0 0 3px rgba(168,85,247,.5)':'none';
    el.textContent=c===color?'✓':'';
  });
  document.getElementById('av-big').style.background=color;
};

window.saveAvatarColor=async function(){
  if(!selectedColor||!currentUser)return;
  await update(ref(db,`users/${currentUser.uid}`),{avatarColor:selectedColor});
  userProfile.avatarColor=selectedColor;
  showToast('🎨 아바타 색상이 저장됐습니다','ok');
};

window.updateName=async function(){
  const name=document.getElementById('name-inp').value.trim();
  if(!name||name.length<2){showToast('이름은 2자 이상 입력하세요','err');return;}
  try{
    await updateProfile(currentUser,{displayName:name});
    await update(ref(db,`users/${currentUser.uid}`),{displayName:name});
    userProfile.displayName=name;
    document.getElementById('prof-name').textContent=name;
    document.getElementById('av-big').textContent=name[0].toUpperCase();
    showToast('✅ 이름이 변경됐습니다','ok');
  }catch(e){showToast('변경 실패: '+e.message,'err');}
};

window.updateStatus=async function(){
  if(!currentUser)return;
  const s=document.getElementById('status-inp').value.trim().slice(0,60);
  try{
    await update(ref(db,`users/${currentUser.uid}`),{statusMsg:s});
    userProfile.statusMsg=s;
    showToast(s?'💬 상태 한마디를 저장했어요':'상태 한마디를 지웠어요','ok');
  }catch(e){showToast('저장 실패: '+e.message,'err');}
};

window.updatePassword=async function(){
  const curPw=document.getElementById('cur-pw').value;
  const newPw=document.getElementById('new-pw').value;
  const newPw2=document.getElementById('new-pw2').value;
  if(!curPw){showToast('현재 비밀번호를 입력하세요','err');return;}
  if(newPw!==newPw2){showToast('새 비밀번호가 일치하지 않습니다','err');return;}
  const pwOk=newPw.length>=6&&/[A-Z]/.test(newPw)&&/[a-z]/.test(newPw)&&/[0-9]/.test(newPw);
  if(!pwOk){showToast('비밀번호 조건을 충족하지 않습니다','err');return;}
  try{
    const cred=EmailAuthProvider.credential(currentUser.email,curPw);
    await reauthenticateWithCredential(currentUser,cred);
    await fbUpdatePassword(currentUser,newPw);
    document.getElementById('cur-pw').value='';
    document.getElementById('new-pw').value='';
    document.getElementById('new-pw2').value='';
    showToast('🔒 비밀번호가 변경됐습니다','ok');
  }catch(e){
    const c=e.code||'';
    if(c.includes('wrong-password')||c.includes('invalid-credential')) showToast('현재 비밀번호가 올바르지 않습니다','err');
    else showToast('변경 실패: '+e.message,'err');
  }
};

window.checkPwStrength=function(v){
  const ok={l:v.length>=6,u:/[A-Z]/.test(v),lo:/[a-z]/.test(v),n:/[0-9]/.test(v)};
  const p=Object.values(ok).filter(Boolean).length;
  const fill=document.getElementById('pw-fill');
  fill.style.width=[0,25,50,75,100][p]+'%';
  fill.style.background=['','#ff4f6a','#ffd166','#c084fc','#a855f7'][p];
  document.getElementById('pw-label').textContent=['','매우 약함','약함','보통','강함'][p];
  document.getElementById('pw-label').style.color=['','#ff4f6a','#ffd166','#c084fc','#a855f7'][p];
  document.getElementById('pc-len').classList.toggle('ok',ok.l);
  document.getElementById('pc-up').classList.toggle('ok',ok.u);
  document.getElementById('pc-lo').classList.toggle('ok',ok.lo);
  document.getElementById('pc-num').classList.toggle('ok',ok.n);
};

window.doLogout=async function(){
  if(currentUser) await set(ref(db,`users/${currentUser.uid}/online`),false);
  await signOut(auth); location.href='index.html';
};

let _t;
window.showToast=function(msg,type='ok'){const el=document.getElementById('toast-el');el.textContent=msg;el.className=`toast show t-${type}`;clearTimeout(_t);_t=setTimeout(()=>el.className='toast',2800);};
</script>

<script>
// Service Worker 등록 (PWA)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js',{updateViaCache:'none'}).then(reg => { reg.update(); document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')reg.update();});
      console.log('SW registered:', reg.scope);
    }).catch(err => console.log('SW registration failed:', err));
  });
}
// SW 메시지 수신 (알림 클릭 → 해당 방 이동)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'NOTIFICATION_CLICK' && e.data.url) {
      location.href = e.data.url;
    }
  });
}
</script>
